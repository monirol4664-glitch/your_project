<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Notebook</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1e1e1e; }
        #container { display: flex; flex-direction: column; height: 100%; }
        #toolbar { padding: 10px; background: #2d2d2d; }
        button { background: #0e639c; color: white; border: none; padding: 8px 16px; margin: 0 5px; border-radius: 4px; }
        .run { background: #2ea043; }
        #editor { flex: 1; }
        #output { height: 30%; background: #1e1e1e; color: #d4d4d4; padding: 10px; overflow: auto; font-family: monospace; border-top: 1px solid #3e3e3e; }
    </style>
</head>
<body>
    <div id="container">
        <div id="toolbar">
            <button class="run" onclick="runCode()">▶ Run</button>
            <button onclick="clearOutput()">Clear</button>
        </div>
        <div id="editor"></div>
        <div id="output">Ready</div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        let editor;
        let pyodide;
        
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: 'import numpy as np\nimport matplotlib.pyplot as plt\n\nprint("Hello!")\nprint(f"numpy: {np.__version__}")',
                language: 'python',
                theme: 'vs-dark',
                fontSize: 14,
                automaticLayout: true
            });
        });
        
        async function loadPyodide() {
            let script = document.createElement('script');
            script.src = "file:///android_asset/pyodide/pyodide.js";
            script.onload = async () => {
                pyodide = await loadPyodide({ indexURL: "file:///android_asset/pyodide/" });
                await pyodide.loadPackage(['numpy', 'matplotlib']);
                document.getElementById('output').innerHTML = "✅ Ready!";
            };
            document.head.appendChild(script);
        }
        
        async function runCode() {
            if (!pyodide) { document.getElementById('output').innerHTML = "Loading..."; return; }
            try {
                pyodide.runPython(`
                    import sys, io
                    sys.stdout = io.StringIO()
                `);
                await pyodide.runPythonAsync(editor.getValue());
                let out = pyodide.runPython('sys.stdout.getvalue()');
                document.getElementById('output').innerHTML = out || "✅ Done";
            } catch(e) {
                document.getElementById('output').innerHTML = "Error: " + e.message;
            }
        }
        
        function clearOutput() {
            document.getElementById('output').innerHTML = "";
        }
        
        setTimeout(loadPyodide, 1000);
    </script>
</body>
</html>
