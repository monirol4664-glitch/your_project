<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Python IDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        }

        /* Force Monaco editor suggestions to show text */
        .monaco-editor .suggest-widget,
        .monaco-editor .suggest-widget .tree,
        .monaco-editor .suggest-widget .monaco-list,
        .monaco-editor .suggest-widget .monaco-list-row,
        .monaco-editor .suggest-widget .suggest-details {
            color: #cccccc !important;
            background: #252526 !important;
        }
        
        .monaco-editor .suggest-widget .monaco-list-row .suggest-label {
            color: #cccccc !important;
        }
        
        .monaco-editor .suggest-widget .monaco-list-row.focused {
            background: #04395e !important;
        }
        
        .monaco-workbench .part.editor > .content .editor-group-container {
            background: #1e1e1e;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .toolbar {
            background: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #3e3e3e;
            flex-shrink: 0;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.96); opacity: 0.8; }
        .run { background: #2ea043; }
        .clear { background: #da3633; }
        .plot { background: #6a0dad; }

        .status {
            background: #1e1e1e;
            color: #89e051;
            padding: 6px 12px;
            font-family: monospace;
            font-size: 11px;
            margin-left: auto;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status.loading::before {
            content: "●";
            color: #f0ad4e;
            font-size: 8px;
            animation: pulse 1s infinite;
        }
        .status.ready::before { content: "●"; color: #2ea043; font-size: 8px; }
        .status.error::before { content: "●"; color: #da3633; font-size: 8px; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .main {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .editor-header {
            background: #2d2d2d;
            padding: 8px 12px;
            color: #ccc;
            font-size: 11px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e3e;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-editor {
            background: #da3633;
            padding: 4px 12px;
            font-size: 11px;
        }

        #editor {
            flex: 1;
            min-height: 0;
        }

        .output-area {
            width: 35%;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            border-left: 1px solid #3e3e3e;
            transition: width 0.25s ease;
        }

        .output-area.minimized {
            width: 40px;
            min-width: 40px;
        }

        .output-header {
            background: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3e3e3e;
            flex-shrink: 0;
            cursor: pointer;
        }
        .output-header:hover { background: #3d3d3d; }

        .output-title {
            color: #ccc;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .minimize-btn {
            background: none;
            padding: 0;
            font-size: 14px;
            color: #ccc;
            width: 28px;
        }
        .minimize-btn:active { transform: none; opacity: 0.7; }

        .output-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #d4d4d4;
        }

        .output-area.minimized .output-content { display: none; }
        .output-area.minimized .output-title { 
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            white-space: nowrap;
            margin: 20px 0;
        }

        .plot-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        .plot-modal.active { display: flex; }

        .plot-header {
            background: #2d2d2d;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3e3e3e;
            flex-shrink: 0;
        }
        .plot-header h3 { color: #89e051; font-size: 16px; font-weight: 500; }
        .close-plot { background: #da3633; padding: 6px 16px; font-size: 14px; }

        .plot-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        #plotImage {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        .plot-controls {
            background: #2d2d2d;
            padding: 10px 16px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-shrink: 0;
            border-top: 1px solid #3e3e3e;
        }

        .plot-controls button { padding: 6px 16px; font-size: 12px; }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .editor-area { flex: 1; }
            .output-area { width: 100%; height: 35%; border-left: none; border-top: 1px solid #3e3e3e; }
            .output-area.minimized { height: 40px; width: 100%; }
            .output-area.minimized .output-title { 
                writing-mode: horizontal-tb;
                transform: none;
                margin: 0;
            }
            button { padding: 6px 12px; font-size: 12px; }
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3e3e3e; border-radius: 2px; }

        .error-text { color: #f85149; }
        .success-text { color: #89e051; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="toolbar">
            <button class="run" onclick="runCode()">▶ Run</button>
            <button class="clear" onclick="clearOutput()">🗑 Clear Output</button>
            <button class="plot" onclick="showPlot()">📊 Plot</button>
            <button onclick="showHelp()">ℹ️ Help</button>
            <div class="status loading" id="status">Starting...</div>
        </div>

        <div class="main">
            <div class="editor-area">
                <div class="editor-header">
                    <span>📝 Code</span>
                    <button class="clear-editor" onclick="clearEditor()">✕ Clear Code</button>
                </div>
                <div id="editor"></div>
            </div>

            <div class="output-area" id="outputArea">
                <div class="output-header" onclick="toggleOutput()">
                    <span class="output-title">📤 Output</span>
                    <button class="minimize-btn" id="minimizeBtn">▶</button>
                </div>
                <div class="output-content" id="output">Initializing Python with numpy & matplotlib...</div>
            </div>
        </div>
    </div>

    <div class="plot-modal" id="plotModal">
        <div class="plot-header">
            <h3>📊 Plot</h3>
            <button class="close-plot" onclick="closePlot()">✕ Close</button>
        </div>
        <div class="plot-content">
            <img id="plotImage" alt="Plot">
        </div>
        <div class="plot-controls">
            <button onclick="zoomIn()">🔍 Zoom In</button>
            <button onclick="zoomOut()">🔍 Zoom Out</button>
            <button onclick="resetZoom()">⟳ Reset</button>
            <button onclick="downloadPlot()">💾 Save</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        let editor, pyodide, isReady = false;
        let currentPlot = null;
        let zoom = 1;
        let outputMinimized = true;

        function toggleOutput() {
            const area = document.getElementById('outputArea');
            const btn = document.getElementById('minimizeBtn');
            outputMinimized = !outputMinimized;
            if (outputMinimized) {
                area.classList.add('minimized');
                btn.innerHTML = '▶';
            } else {
                area.classList.remove('minimized');
                btn.innerHTML = '◀';
            }
        }

        function clearEditor() {
            if (editor) {
                editor.setValue('');
            }
        }

        // Initialize Monaco Editor
        function initEditor() {
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
            
            require(['vs/editor/editor.main'], function() {
                editor = monaco.editor.create(document.getElementById('editor'), {
                    value: `import numpy as np
import matplotlib.pyplot as plt

# Create data
x = np.linspace(0, 10, 100)
y = np.sin(x)

print("Hello from Python!")
print(f"NumPy: {np.__version__}")

plt.plot(x, y)
plt.title("Sine Wave")
plt.xlabel("x")
plt.ylabel("sin(x)")
plt.grid(True)
plt.show()`,
                    language: 'python',
                    theme: 'vs-dark',
                    fontSize: 14,
                    automaticLayout: true,
                    lineNumbers: 'on',
                    wordWrap: 'on',
                    minimap: { enabled: false },
                    suggestOnTriggerCharacters: true,
                    quickSuggestions: true
                });

                // Register autocomplete provider with visible suggestions
                monaco.languages.registerCompletionItemProvider('python', {
                    triggerCharacters: ['.', ' '],
                    provideCompletionItems: function(model, position) {
                        var suggestions = [];
                        
                        // Python keywords
                        var keywords = [
                            'def', 'class', 'import', 'from', 'as', 'return',
                            'if', 'elif', 'else', 'for', 'while', 'break',
                            'continue', 'pass', 'try', 'except', 'finally',
                            'with', 'lambda', 'yield', 'assert', 'global', 'nonlocal'
                        ];
                        
                        keywords.forEach(k => {
                            suggestions.push({
                                label: k,
                                kind: monaco.languages.CompletionItemKind.Keyword,
                                insertText: k,
                                detail: 'Python keyword',
                                documentation: 'Python keyword'
                            });
                        });
                        
                        // Built-in functions
                        var builtins = [
                            'print', 'len', 'range', 'type', 'str', 'int', 'float',
                            'list', 'dict', 'set', 'tuple', 'bool', 'sum', 'min',
                            'max', 'abs', 'round', 'sorted', 'enumerate', 'zip',
                            'map', 'filter', 'any', 'all', 'isinstance'
                        ];
                        
                        builtins.forEach(b => {
                            suggestions.push({
                                label: b,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: b,
                                detail: 'Built-in function',
                                documentation: 'Python built-in function'
                            });
                        });
                        
                        // NumPy functions
                        var numpyFuncs = [
                            'array', 'arange', 'linspace', 'zeros', 'ones', 'empty',
                            'sin', 'cos', 'tan', 'exp', 'log', 'sqrt',
                            'mean', 'median', 'std', 'var', 'min', 'max', 'sum'
                        ];
                        
                        numpyFuncs.forEach(f => {
                            suggestions.push({
                                label: f,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: f,
                                detail: 'NumPy function: ' + f,
                                documentation: 'Use with np.' + f + '()'
                            });
                        });
                        
                        // Matplotlib functions
                        var pltFuncs = [
                            'plot', 'scatter', 'bar', 'hist', 'pie',
                            'xlabel', 'ylabel', 'title', 'legend', 'grid',
                            'show', 'savefig', 'figure', 'subplot'
                        ];
                        
                        pltFuncs.forEach(f => {
                            suggestions.push({
                                label: f,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: f,
                                detail: 'Matplotlib function: ' + f,
                                documentation: 'Use with plt.' + f + '()'
                            });
                        });
                        
                        return { suggestions: suggestions };
                    }
                });
            });
        }

        // Load Pyodide
        async function loadPython() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            status.className = 'status loading';
            status.innerHTML = 'Downloading...';
            output.innerHTML = '⏳ First time setup (10-20 seconds)\nDownloading Python + numpy + matplotlib...\n\nThis happens only once!\n';
            
            try {
                output.innerHTML += '📦 Loading runtime...\n';
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('Network error'));
                    document.head.appendChild(script);
                    setTimeout(() => reject(new Error('Timeout')), 60000);
                });
                
                output.innerHTML += '✓ Runtime loaded\n🐍 Initializing...\n';
                pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
                
                output.innerHTML += '✓ Python ready\n📦 Installing numpy...\n';
                status.innerHTML = 'numpy...';
                await pyodide.loadPackage('numpy');
                
                output.innerHTML += '✓ numpy installed\n📦 Installing matplotlib...\n';
                status.innerHTML = 'matplotlib...';
                await pyodide.loadPackage('matplotlib');
                
                output.innerHTML += '✓ matplotlib installed\n🔧 Finalizing...\n';
                
                pyodide.runPython(`
                    import sys, io, base64
                    import matplotlib
                    matplotlib.use('Agg')
                    import matplotlib.pyplot as plt
                    import numpy as np
                    
                    captured_plots = []
                    
                    def capture_plot(*args, **kwargs):
                        buf = io.BytesIO()
                        plt.savefig(buf, format='png', dpi=100, bbox_inches='tight')
                        buf.seek(0)
                        captured_plots.append(base64.b64encode(buf.read()).decode())
                        buf.close()
                        plt.close()
                        print("__PLOT__")
                    
                    plt.show = capture_plot
                    
                    sys.stdout_capture = io.StringIO()
                    class Tee:
                        def __init__(self, cap): self.cap = cap
                        def write(self, t): self.cap.write(t)
                        def flush(self): pass
                    sys.stdout = Tee(sys.stdout_capture)
                    
                    print("="*40)
                    print("✅ Python IDE Ready!")
                    print(f"NumPy: {np.__version__}")
                    print(f"Matplotlib: {matplotlib.__version__}")
                    print("="*40)
                `);
                
                const readyMsg = pyodide.runPython('sys.stdout_capture.getvalue()');
                output.innerHTML = readyMsg;
                
                status.className = 'status ready';
                status.innerHTML = 'Ready';
                isReady = true;
                
            } catch (err) {
                output.innerHTML += `\n<span class="error-text">❌ Error: ${err.message}</span>\n\nPlease check internet connection.`;
                status.className = 'status error';
                status.innerHTML = 'Error';
            }
        }

        async function runCode() {
            if (!isReady) {
                document.getElementById('output').innerHTML = '⚠️ Loading Python. Please wait...';
                return;
            }
            
            const code = editor.getValue();
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            status.className = 'status loading';
            status.innerHTML = 'Running...';
            
            try {
                pyodide.runPython(`
                    import sys
                    sys.stdout_capture = io.StringIO()
                    sys.stdout = Tee(sys.stdout_capture)
                    captured_plots = []
                `);
                
                await pyodide.runPythonAsync(code);
                
                const stdout = pyodide.runPython('sys.stdout_capture.getvalue()');
                const plots = pyodide.runPython('captured_plots');
                
                if (plots && plots.length) {
                    currentPlot = plots[plots.length - 1];
                    document.getElementById('plotImage').src = `data:image/png;base64,${currentPlot}`;
                }
                
                output.innerHTML = stdout || '✓ Done';
                status.className = 'status ready';
                status.innerHTML = 'Ready';
                
            } catch (err) {
                output.innerHTML = `<span class="error-text">❌ ${err.message}</span>`;
                status.className = 'status error';
                status.innerHTML = 'Error';
                setTimeout(() => {
                    status.className = 'status ready';
                    status.innerHTML = 'Ready';
                }, 2000);
            }
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            currentPlot = null;
            closePlot();
        }

        function showPlot() {
            if (currentPlot) {
                document.getElementById('plotModal').classList.add('active');
                resetZoom();
            } else {
                document.getElementById('output').innerHTML += '\n\n⚠️ No plot. Use plt.show()';
            }
        }

        function closePlot() {
            document.getElementById('plotModal').classList.remove('active');
            resetZoom();
        }

        function zoomIn() { zoom = Math.min(zoom + 0.25, 3); updateZoom(); }
        function zoomOut() { zoom = Math.max(zoom - 0.25, 0.5); updateZoom(); }
        function resetZoom() { zoom = 1; updateZoom(); }
        function updateZoom() { document.getElementById('plotImage').style.transform = `scale(${zoom})`; }
        
        function downloadPlot() {
            if (currentPlot) {
                const link = document.createElement('a');
                link.download = 'plot.png';
                link.href = `data:image/png;base64,${currentPlot}`;
                link.click();
            }
        }

        function showHelp() {
            document.getElementById('output').innerHTML = `
<span class="success-text">📖 Python IDE</span>
════════════════════════

✅ numpy & matplotlib included
✅ Use plt.show() for plots
✅ Autocomplete working:
   - Type "pri" → shows print
   - Type "np." → shows NumPy functions
   - Type "plt." → shows Matplotlib functions
✅ Clear Code button clears editor
✅ Clear Output button clears console

Example:
import numpy as np
import matplotlib.pyplot as plt

x = np.linspace(0, 10, 100)
plt.plot(x, np.sin(x))
plt.show()
            `;
        }

        initEditor();
        setTimeout(loadPython, 500);
    </script>
</body>
</html>
