<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Python Notebook - VS Code Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            background: #2d2d2d;
            border-bottom: 1px solid #3c3c3c;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            background: #007acc;
            width: 28px;
            height: 28px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 500;
            color: #e8e8e8;
        }

        .kernel-badge {
            background: #1e1e1e;
            color: #6aab5a;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            background: #3c3c3c;
            color: #e8e8e8;
            border: none;
            padding: 5px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #4c4c4c;
        }

        .btn-primary {
            background: #2d6a4f;
        }

        .btn-primary:hover {
            background: #40916c;
        }

        /* Notebook Container */
        .notebook {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Cell */
        .cell {
            background: #252526;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #3c3c3c;
            overflow: hidden;
        }

        .cell-header {
            background: #2d2d2d;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c3c3c;
        }

        .cell-label {
            font-family: monospace;
            font-size: 11px;
            color: #6aab5a;
        }

        .cell-controls {
            display: flex;
            gap: 8px;
        }

        .cell-controls button {
            background: none;
            border: none;
            padding: 4px 10px;
            font-size: 11px;
            color: #9a9a9a;
            cursor: pointer;
        }

        .cell-controls button:hover {
            background: #3c3c3c;
            color: white;
        }

        /* Monaco Editor Container */
        .monaco-container {
            height: 200px;
            width: 100%;
        }

        /* Output */
        .output {
            padding: 12px 16px;
            background: #1e1e1e;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: #d4d4d4;
            border-top: 1px solid #3c3c3c;
        }

        .output.error {
            color: #f48771;
            background: #2d2d2d;
        }

        .output.plot {
            text-align: center;
            padding: 16px;
        }

        .output.plot img {
            max-width: 100%;
            max-height: 380px;
            border-radius: 8px;
        }

        .add-cell {
            background: none;
            border: 2px dashed #4a4a4a;
            width: 100%;
            padding: 14px;
            color: #8a8a8a;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 8px;
        }

        .add-cell:hover {
            background: #2a2a2a;
            border-color: #6a6a6a;
            color: #b8b8b8;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }

        @media (max-width: 768px) {
            .top-bar { padding: 8px 12px; }
            .notebook { padding: 10px; }
            .monaco-container { height: 180px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">
            <div class="logo-box">Py</div>
            <span class="logo-text">Python Notebook</span>
            <span class="kernel-badge" id="kernelStatus">● Ready</span>
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="runAllCells()">Run All</button>
            <button onclick="clearAllOutputs()">Clear Outputs</button>
        </div>
    </div>

    <div class="notebook" id="notebook"></div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        let pyodide = null;
        let ready = false;
        let cells = [];
        let nextId = 1;
        let editors = new Map();

        // VS Code style Python keywords for autocomplete
        const pythonKeywords = [
            'False', 'None', 'True', 'and', 'as', 'assert', 'async', 'await',
            'break', 'class', 'continue', 'def', 'del', 'elif', 'else', 'except',
            'finally', 'for', 'from', 'global', 'if', 'import', 'in', 'is',
            'lambda', 'nonlocal', 'not', 'or', 'pass', 'raise', 'return',
            'try', 'while', 'with', 'yield'
        ];

        const pythonBuiltins = [
            'abs', 'all', 'any', 'bin', 'bool', 'chr', 'dict', 'dir', 'enumerate',
            'filter', 'float', 'format', 'help', 'hex', 'input', 'int', 'isinstance',
            'len', 'list', 'map', 'max', 'min', 'oct', 'ord', 'pow', 'print',
            'range', 'repr', 'reversed', 'round', 'set', 'sorted', 'str', 'sum',
            'tuple', 'type', 'zip'
        ];

        const numpyFuncs = [
            'array', 'arange', 'linspace', 'zeros', 'ones', 'empty', 'eye',
            'random', 'sin', 'cos', 'tan', 'exp', 'log', 'sqrt', 'mean', 
            'median', 'std', 'var', 'min', 'max', 'sum', 'dot', 'reshape'
        ];

        const matplotlibFuncs = [
            'plot', 'scatter', 'bar', 'hist', 'pie', 'imshow', 'contour',
            'xlabel', 'ylabel', 'title', 'legend', 'grid', 'show', 'savefig',
            'figure', 'subplot', 'subplots', 'tight_layout'
        ];

        const sympyFuncs = [
            'Symbol', 'symbols', 'diff', 'integrate', 'simplify', 'factor',
            'expand', 'solve', 'limit', 'series', 'Matrix', 'Eq', 'Rational'
        ];

        function initMonacoEditor(container, code, cellId) {
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
            
            return new Promise((resolve) => {
                require(['vs/editor/editor.main'], function() {
                    const editor = monaco.editor.create(container, {
                        value: code,
                        language: 'python',
                        theme: 'vs-dark',
                        fontSize: 13,
                        fontFamily: 'Consolas, "Courier New", monospace',
                        lineNumbers: 'on',
                        minimap: { enabled: false },
                        wordWrap: 'on',
                        automaticLayout: true,
                        scrollBeyondLastLine: false,
                        suggestOnTriggerCharacters: true,
                        quickSuggestions: {
                            other: true,
                            comments: false,
                            strings: false
                        },
                        parameterHints: { enabled: true },
                        formatOnType: true,
                        formatOnPaste: true
                    });

                    // Register Python autocomplete provider
                    monaco.languages.registerCompletionItemProvider('python', {
                        triggerCharacters: ['.', ' '],
                        provideCompletionItems: function(model, position) {
                            const word = model.getWordUntilPosition(position);
                            const range = {
                                startLineNumber: position.lineNumber,
                                endLineNumber: position.lineNumber,
                                startColumn: word.startColumn,
                                endColumn: word.endColumn
                            };
                            
                            const suggestions = [];

                            // Keywords
                            pythonKeywords.forEach(kw => {
                                suggestions.push({
                                    label: kw,
                                    kind: monaco.languages.CompletionItemKind.Keyword,
                                    insertText: kw,
                                    range: range,
                                    detail: 'Python keyword',
                                    sortText: '1' + kw
                                });
                            });

                            // Builtins
                            pythonBuiltins.forEach(bi => {
                                suggestions.push({
                                    label: bi,
                                    kind: monaco.languages.CompletionItemKind.Function,
                                    insertText: bi + '($1)',
                                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                    range: range,
                                    detail: 'Built-in function',
                                    sortText: '2' + bi
                                });
                            });

                            // NumPy
                            numpyFuncs.forEach(nf => {
                                suggestions.push({
                                    label: nf,
                                    kind: monaco.languages.CompletionItemKind.Function,
                                    insertText: 'np.' + nf + '($1)',
                                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                    range: range,
                                    detail: 'NumPy function',
                                    sortText: '3' + nf
                                });
                            });

                            // Matplotlib
                            matplotlibFuncs.forEach(mf => {
                                suggestions.push({
                                    label: mf,
                                    kind: monaco.languages.CompletionItemKind.Function,
                                    insertText: 'plt.' + mf + '($1)',
                                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                    range: range,
                                    detail: 'Matplotlib function',
                                    sortText: '4' + mf
                                });
                            });

                            // SymPy
                            sympyFuncs.forEach(sf => {
                                suggestions.push({
                                    label: sf,
                                    kind: monaco.languages.CompletionItemKind.Function,
                                    insertText: 'sp.' + sf + '($1)',
                                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                    range: range,
                                    detail: 'SymPy function',
                                    sortText: '5' + sf
                                });
                            });

                            // Module suggestions
                            suggestions.push({
                                label: 'np',
                                kind: monaco.languages.CompletionItemKind.Module,
                                insertText: 'np',
                                range: range,
                                detail: 'NumPy module',
                                sortText: '0np'
                            });

                            suggestions.push({
                                label: 'plt',
                                kind: monaco.languages.CompletionItemKind.Module,
                                insertText: 'plt',
                                range: range,
                                detail: 'Matplotlib module',
                                sortText: '0plt'
                            });

                            suggestions.push({
                                label: 'sp',
                                kind: monaco.languages.CompletionItemKind.Module,
                                insertText: 'sp',
                                range: range,
                                detail: 'SymPy module',
                                sortText: '0sp'
                            });

                            return { suggestions: suggestions };
                        }
                    });

                    // Save code changes
                    editor.onDidChangeModelContent(() => {
                        const cell = cells.find(c => c.id === cellId);
                        if (cell) cell.code = editor.getValue();
                    });

                    resolve(editor);
                });
            });
        }

        class Cell {
            constructor(id, code) {
                this.id = id;
                this.code = code;
                this.output = null;
                this.isPlot = false;
                this.editor = null;
            }

            getDefaultCode() {
                return `# VS Code Style Python Editor
# Features:
# - Syntax highlighting
# - Autocomplete (Ctrl+Space)
# - IntelliSense

import numpy as np
import matplotlib.pyplot as plt
import sympy as sp

# Try typing: np. , plt. , sp.
# Press Ctrl+Space for suggestions

print("Hello from Python!")

# NumPy example
arr = np.array([1, 2, 3, 4, 5])
print(f"Mean: {np.mean(arr)}")

# SymPy example
x = sp.Symbol('x')
print(f"Derivative: {sp.diff(x**2, x)}")

# Matplotlib example
plt.figure(figsize=(8, 4))
plt.plot([1,2,3,4,5], arr, 'b-o', linewidth=2)
plt.title("Sample Plot")
plt.grid(True, alpha=0.3)
plt.show()`;
            }

            async render(index) {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                cellDiv.id = `cell-${this.id}`;
                
                const header = document.createElement('div');
                header.className = 'cell-header';
                header.innerHTML = `
                    <span class="cell-label">In [${index + 1}]:</span>
                    <div class="cell-controls">
                        <button onclick="runCell(${this.id})">Run</button>
                        <button onclick="deleteCell(${this.id})">Delete</button>
                        <button onclick="addCellBelow(${this.id})">Add</button>
                    </div>
                `;
                
                const editorContainer = document.createElement('div');
                editorContainer.className = 'monaco-container';
                
                const outputDiv = document.createElement('div');
                outputDiv.className = 'output';
                if (this.output) {
                    if (this.isPlot) {
                        outputDiv.innerHTML = `<img src="${this.output}" alt="plot">`;
                        outputDiv.classList.add('plot');
                    } else {
                        outputDiv.innerHTML = this.output.replace(/\n/g, '<br>');
                    }
                } else {
                    outputDiv.innerHTML = 'Ready';
                }
                
                cellDiv.appendChild(header);
                cellDiv.appendChild(editorContainer);
                cellDiv.appendChild(outputDiv);
                
                return { cellDiv, editorContainer };
            }

            async initEditor(container) {
                this.editor = await initMonacoEditor(container, this.code, this.id);
            }

            async execute() {
                if (!ready || !pyodide) return;
                
                const outputDiv = document.querySelector(`#cell-${this.id} .output`);
                if (!outputDiv) return;
                
                outputDiv.innerHTML = 'Running...';
                outputDiv.classList.remove('error', 'plot');
                
                try {
                    pyodide.runPython(`
                        import sys, io, base64
                        sys.stdout = io.StringIO()
                        sys.stderr = io.StringIO()
                        captured_plots = []
                    `);
                    
                    await pyodide.runPythonAsync(this.code);
                    
                    const stdout = pyodide.runPython('sys.stdout.getvalue()');
                    const stderr = pyodide.runPython('sys.stderr.getvalue()');
                    const plots = pyodide.runPython('captured_plots');
                    
                    if (plots && plots.length > 0) {
                        this.output = `data:image/png;base64,${plots[plots.length - 1]}`;
                        this.isPlot = true;
                        outputDiv.innerHTML = `<img src="${this.output}" alt="plot">`;
                        outputDiv.classList.add('plot');
                    } else {
                        let text = stdout;
                        if (stderr) text += `\n${stderr}`;
                        if (!text.trim()) text = 'Done';
                        this.output = text;
                        this.isPlot = false;
                        outputDiv.innerHTML = text.replace(/\n/g, '<br>');
                    }
                } catch (err) {
                    this.output = err.message;
                    this.isPlot = false;
                    outputDiv.innerHTML = `Error: ${err.message}`;
                    outputDiv.classList.add('error');
                }
            }
        }

        async function renderAll() {
            const container = document.getElementById('notebook');
            container.innerHTML = '';
            
            for (let i = 0; i < cells.length; i++) {
                const cell = cells[i];
                const { cellDiv, editorContainer } = await cell.render(i);
                container.appendChild(cellDiv);
                await cell.initEditor(editorContainer);
            }
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-cell';
            addBtn.textContent = '+ Add Cell';
            addBtn.onclick = () => {
                const newCell = new Cell(nextId++, '');
                cells.push(newCell);
                renderAll();
            };
            container.appendChild(addBtn);
        }

        function addCellBelow(id) {
            const idx = cells.findIndex(c => c.id === id);
            const newCell = new Cell(nextId++, '');
            cells.splice(idx + 1, 0, newCell);
            renderAll();
        }

        function deleteCell(id) {
            if (cells.length > 1) {
                cells = cells.filter(c => c.id !== id);
                renderAll();
            }
        }

        async function runCell(id) {
            const cell = cells.find(c => c.id === id);
            if (cell) await cell.execute();
        }

        async function runAllCells() {
            for (const cell of cells) await cell.execute();
        }

        function clearAllOutputs() {
            cells.forEach(cell => {
                cell.output = null;
                cell.isPlot = false;
            });
            renderAll();
        }

        async function initPython() {
            const status = document.getElementById('kernelStatus');
            status.textContent = 'Loading Python...';
            try {
                await new Promise(resolve => {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
                    script.onload = resolve;
                    document.head.appendChild(script);
                });
                
                pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
                
                status.textContent = 'Loading NumPy...';
                await pyodide.loadPackage('numpy');
                
                status.textContent = 'Loading Matplotlib...';
                await pyodide.loadPackage('matplotlib');
                
                status.textContent = 'Loading SymPy...';
                await pyodide.loadPackage('sympy');
                
                pyodide.runPython(`
                    import matplotlib
                    matplotlib.use('Agg')
                    import matplotlib.pyplot as plt
                    import numpy as np
                    import sympy as sp
                    captured_plots = []
                    
                    def custom_show(*args, **kwargs):
                        import io, base64
                        buf = io.BytesIO()
                        plt.savefig(buf, format='png', dpi=100, bbox_inches='tight')
                        captured_plots.append(base64.b64encode(buf.getvalue()).decode())
                        buf.close()
                        plt.close()
                    
                    plt.show = custom_show
                `);
                
                status.textContent = 'Ready';
                ready = true;
            } catch (err) {
                status.textContent = 'Error';
                console.error(err);
            }
        }

        const starterCode = `# VS Code Style Python Editor
# Features:
# - Syntax highlighting
# - Autocomplete (Ctrl+Space)
# - IntelliSense

import numpy as np
import matplotlib.pyplot as plt
import sympy as sp

# Try typing: np. , plt. , sp.
# Press Ctrl+Space for suggestions

print("Hello from Python!")

# NumPy example
arr = np.array([1, 2, 3, 4, 5])
print(f"Mean: {np.mean(arr)}")

# SymPy example
x = sp.Symbol('x')
print(f"Derivative: {sp.diff(x**2, x)}")

# Matplotlib example
plt.figure(figsize=(8, 4))
plt.plot([1,2,3,4,5], arr, 'b-o', linewidth=2)
plt.title("Sample Plot")
plt.grid(True, alpha=0.3)
plt.show()`;

        cells = [new Cell(nextId++, starterCode)];
        renderAll();
        initPython();
    </script>
</body>
</html>
