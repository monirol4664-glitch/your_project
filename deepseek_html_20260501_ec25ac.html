<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Python IDE - Custom Library Install</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        /* Loading Window */
        .loading-window {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1e1e1e;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loading-window.hide {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #3c3c3c;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ccc;
            font-family: monospace;
            font-size: 13px;
        }

        .loading-progress {
            width: 250px;
            height: 3px;
            background: #3c3c3c;
            border-radius: 2px;
            margin-top: 15px;
        }

        .loading-progress-bar {
            width: 0%;
            height: 100%;
            background: #007acc;
            transition: width 0.3s ease;
        }

        .loading-status {
            color: #6aab5a;
            font-size: 10px;
            margin-top: 10px;
            font-family: monospace;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d6a4f;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* Top Bar */
        .top-bar {
            background: #2d2d2d;
            border-bottom: 1px solid #3c3c3c;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 44px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        .logo-text {
            font-size: 12px;
            font-weight: 600;
            color: #e8e8e8;
        }

        .kernel-badge {
            background: #1e1e1e;
            color: #6aab5a;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 8px;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        button {
            background: #3c3c3c;
            color: #e8e8e8;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        button svg {
            width: 12px;
            height: 12px;
            stroke: #e8e8e8;
            stroke-width: 2;
            fill: none;
        }

        button:hover {
            background: #4c4c4c;
        }

        .btn-primary {
            background: #2d6a4f;
        }

        .btn-primary:hover {
            background: #40916c;
        }

        .btn-install {
            background: #0e639c;
        }

        /* Custom Install Input */
        .custom-install {
            background: #1e1e1e;
            padding: 8px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            gap: 8px;
        }

        .custom-install input {
            flex: 1;
            background: #2d2d2d;
            border: 1px solid #3c3c3c;
            color: #e8e8e8;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            outline: none;
        }

        .custom-install input:focus {
            border-color: #007acc;
        }

        .custom-install button {
            background: #2d6a4f;
            padding: 5px 12px;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Variables Panel */
        .variables-panel {
            width: 240px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.2s ease;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 20;
            transform: translateX(-100%);
        }

        .variables-panel.visible {
            transform: translateX(0);
        }

        .panel-header {
            background: #2d2d2d;
            padding: 6px 8px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            font-weight: 600;
            color: #ccc;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 4px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .panel-actions {
            padding: 6px;
            border-bottom: 1px solid #3c3c3c;
        }

        .panel-actions button {
            width: 100%;
            background: #0e639c;
            font-size: 9px;
            padding: 4px;
        }

        .variables-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .var-item {
            background: #1e1e1e;
            padding: 5px 7px;
            margin-bottom: 4px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            font-family: monospace;
            font-size: 9px;
        }

        .var-name {
            color: #4ec9b0;
            font-weight: 600;
            font-size: 10px;
        }

        .var-value {
            color: #ce9178;
            font-size: 8px;
            margin-top: 2px;
            word-break: break-all;
        }

        .show-vars-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #0e639c;
            color: white;
            border: none;
            padding: 6px 3px;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-size: 9px;
            z-index: 15;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /* Notebook */
        .notebook {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            width: 100%;
        }

        .cell {
            background: #252526;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #3c3c3c;
            overflow: hidden;
        }

        .cell-header {
            background: #2d2d2d;
            padding: 5px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c3c3c;
        }

        .cell-label {
            font-family: monospace;
            font-size: 9px;
            color: #6aab5a;
        }

        .cell-controls {
            display: flex;
            gap: 3px;
        }

        .cell-controls button {
            background: none;
            border: none;
            padding: 2px 6px;
            font-size: 9px;
            color: #9a9a9a;
            cursor: pointer;
        }

        .copy-shell-btn {
            background: none;
            border: none;
            padding: 2px 6px;
            font-size: 9px;
            color: #6aab5a;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .monaco-container {
            height: 150px;
            width: 100%;
        }

        .output {
            padding: 6px 8px;
            background: #1e1e1e;
            font-family: monospace;
            font-size: 9px;
            line-height: 1.3;
            white-space: pre-wrap;
            color: #d4d4d4;
            border-top: 1px solid #3c3c3c;
            max-height: 120px;
            overflow-y: auto;
        }

        .output.error {
            color: #f48771;
        }

        .output.plot {
            text-align: center;
            padding: 6px;
        }

        .output.plot img {
            max-width: 100%;
            max-height: 160px;
            border-radius: 4px;
            cursor: pointer;
        }

        .output-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
        }

        .add-cell {
            background: none;
            border: 2px dashed #4a4a4a;
            width: 100%;
            padding: 8px;
            color: #8a8a8a;
            font-size: 10px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 6px;
        }

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 70%;
            border-radius: 8px;
        }

        .image-modal button {
            margin-top: 15px;
            padding: 6px 16px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #252526;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            max-height: 70%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: #2d2d2d;
            padding: 10px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #6aab5a;
            font-size: 13px;
        }

        .modal-body {
            padding: 10px;
            overflow-y: auto;
        }

        .lib-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lib-category {
            color: #89e051;
            font-size: 10px;
            font-weight: 600;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        .lib-item {
            background: #1e1e1e;
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lib-name {
            color: #4ec9b0;
            font-family: monospace;
            font-size: 11px;
        }

        .lib-desc {
            color: #858585;
            font-size: 8px;
        }

        .install-btn {
            background: #0e639c;
            padding: 3px 8px;
            font-size: 9px;
        }

        .close-modal {
            background: #da3633;
            padding: 5px 10px;
        }

        @media (min-width: 769px) {
            .variables-panel { position: relative; transform: translateX(0); }
            .show-vars-btn { display: none; }
        }

        @media (max-width: 768px) {
            .top-bar { padding: 4px 8px; }
            .notebook { padding: 4px; }
            .monaco-container { height: 130px; }
        }
    </style>
</head>
<body>
    <div class="loading-window" id="loadingWindow">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Starting Python</div>
        <div class="loading-progress"><div class="loading-progress-bar" id="loadingProgress"></div></div>
        <div class="loading-status" id="loadingStatus">Connecting...</div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <div class="top-bar">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <span class="logo-text">Python IDE</span>
            <span class="kernel-badge" id="kernelStatus">● Loading</span>
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="runAllCells()">Run All</button>
            <button onclick="clearAllOutputs()">Clear</button>
            <button class="btn-install" onclick="showLibraryModal()">Install</button>
        </div>
    </div>

    <div class="main-layout">
        <button class="show-vars-btn" onclick="toggleVariablesPanel()">VARS</button>
        <div class="variables-panel" id="variablesPanel">
            <div class="panel-header"><span>VARIABLES</span><button class="toggle-btn" onclick="toggleVariablesPanel()">✕</button></div>
            <div class="panel-actions"><button onclick="refreshVariables()">Refresh</button></div>
            <div class="variables-list" id="variablesList"><div style="color:#666;text-align:center;padding:20px;font-size:10px">No variables</div></div>
        </div>
        <div class="notebook" id="notebook"></div>
    </div>

    <div class="image-modal" id="imageModal">
        <img id="previewImage" alt="Preview">
        <button onclick="downloadCurrentImage()">Download</button>
        <button onclick="closeImageModal()" style="background:#da3633; margin-top:8px;">Close</button>
    </div>

    <div class="modal" id="libraryModal">
        <div class="modal-content">
            <div class="modal-header"><h3>Install Python Library</h3><button class="close-modal" onclick="closeLibraryModal()">✕</button></div>
            <div class="modal-body">
                <!-- Custom Install by Typing -->
                <div class="custom-install">
                    <input type="text" id="customLibName" placeholder="Type library name (e.g., requests, pandas, folium)" autocomplete="off">
                    <button onclick="installCustomLibrary()">Install</button>
                </div>
                <div style="margin: 10px 0; text-align: center; color: #666; font-size: 9px;">───────── or select from below ─────────</div>
                <div class="lib-list" id="libList"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        let pyodide = null;
        let ready = false;
        let cells = [];
        let nextId = 1;
        let globalVariables = {};
        let installedPackages = new Set();
        let dynamicKeywords = [];

        // Library database with keywords for autocomplete
        const libraryDB = {
            'numpy': { keywords: ['np', 'array', 'arange', 'linspace', 'zeros', 'ones', 'mean', 'std', 'sin', 'cos', 'tan', 'exp', 'log', 'sqrt'] },
            'pandas': { keywords: ['pd', 'DataFrame', 'Series', 'read_csv', 'head', 'tail', 'groupby', 'merge', 'concat', 'dropna'] },
            'matplotlib': { keywords: ['plt', 'plot', 'scatter', 'bar', 'hist', 'show', 'title', 'xlabel', 'ylabel', 'legend', 'grid', 'figure'] },
            'scipy': { keywords: ['stats', 'optimize', 'interpolate', 'integrate', 'signal', 'linalg', 'fft'] },
            'sympy': { keywords: ['sp', 'Symbol', 'symbols', 'diff', 'integrate', 'simplify', 'solve', 'limit', 'series', 'Matrix'] },
            'scikit-learn': { keywords: ['sklearn', 'train_test_split', 'LinearRegression', 'RandomForest', 'fit', 'predict', 'accuracy_score'] },
            'requests': { keywords: ['get', 'post', 'put', 'delete', 'status_code', 'json', 'text', 'content'] },
            'beautifulsoup4': { keywords: ['BeautifulSoup', 'find', 'find_all', 'select', 'get_text', 'soup'] },
            'flask': { keywords: ['Flask', 'route', 'run', 'request', 'render_template', 'jsonify'] },
            'folium': { keywords: ['Map', 'Marker', 'TileLayer', 'Popup', 'Icon', 'Circle', 'PolyLine'] },
            'pillow': { keywords: ['Image', 'open', 'save', 'resize', 'crop', 'rotate', 'convert'] },
            'seaborn': { keywords: ['sns', 'set_theme', 'histplot', 'boxplot', 'heatmap', 'pairplot', 'catplot'] },
            'plotly': { keywords: ['px', 'go', 'Figure', 'line', 'bar', 'scatter', 'layout', 'update_layout'] },
            'tqdm': { keywords: ['tqdm'] },
            'sqlalchemy': { keywords: ['create_engine', 'sessionmaker', 'Table', 'Column', 'Integer', 'String'] },
            'opencv-python': { keywords: ['cv2', 'imread', 'imshow', 'imwrite', 'cvtColor', 'resize', 'VideoCapture'] },
            'pygame': { keywords: ['pygame', 'init', 'display', 'Surface', 'Rect', 'draw', 'event', 'sprite'] }
        };

        // Pre-defined popular libraries list
        const popularLibraries = [
            { name: 'numpy', desc: 'Numerical computing', cat: 'Data Science' },
            { name: 'pandas', desc: 'Data analysis', cat: 'Data Science' },
            { name: 'matplotlib', desc: 'Plotting', cat: 'Visualization' },
            { name: 'scipy', desc: 'Scientific computing', cat: 'Data Science' },
            { name: 'sympy', desc: 'Symbolic math', cat: 'Math' },
            { name: 'scikit-learn', desc: 'Machine Learning', cat: 'ML/AI' },
            { name: 'requests', desc: 'HTTP library', cat: 'Web' },
            { name: 'beautifulsoup4', desc: 'Web scraping', cat: 'Web' },
            { name: 'flask', desc: 'Web framework', cat: 'Web' },
            { name: 'folium', desc: 'Maps', cat: 'GIS' },
            { name: 'pillow', desc: 'Image processing', cat: 'Image' },
            { name: 'seaborn', desc: 'Statistical viz', cat: 'Visualization' },
            { name: 'plotly', desc: 'Interactive plots', cat: 'Visualization' },
            { name: 'tqdm', desc: 'Progress bars', cat: 'Utils' },
            { name: 'sqlalchemy', desc: 'SQL toolkit', cat: 'Database' },
            { name: 'opencv-python', desc: 'Computer vision', cat: 'Image' },
            { name: 'pygame', desc: 'Game dev', cat: 'Gaming' }
        ];

        function updateDynamicKeywords() {
            dynamicKeywords = [];
            installedPackages.forEach(pkg => {
                if (libraryDB[pkg]) {
                    dynamicKeywords.push(...libraryDB[pkg].keywords);
                }
                dynamicKeywords.push(pkg);
            });
            // Refresh editor suggestions
            if (window.editor) {
                window.editor.trigger('any', 'editor.action.triggerSuggest', {});
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
        }

        function copyCellCode(cellId) {
            const cell = cells.find(c => c.id === cellId);
            if (cell && cell.code) copyToClipboard(cell.code);
        }

        function showImageModal(src) {
            document.getElementById('previewImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeImageModal() { document.getElementById('imageModal').classList.remove('active'); }
        
        function downloadCurrentImage() {
            const img = document.getElementById('previewImage');
            const link = document.createElement('a');
            link.download = 'plot.png';
            link.href = img.src;
            link.click();
            showToast('Image saved!');
        }

        function toggleVariablesPanel() { document.getElementById('variablesPanel').classList.toggle('visible'); }

        function updateLoading(step, progress, status) {
            document.getElementById('loadingText').textContent = step;
            document.getElementById('loadingProgress').style.width = progress + '%';
            if (status) document.getElementById('loadingStatus').textContent = status;
        }

        function hideLoading() {
            document.getElementById('loadingWindow').classList.add('hide');
            document.getElementById('kernelStatus').innerHTML = '● Ready';
        }

        // Install library by typing the name
        async function installCustomLibrary() {
            const input = document.getElementById('customLibName');
            const libName = input.value.trim().toLowerCase();
            if (!libName) {
                showToast('Enter a library name');
                return;
            }
            
            if (installedPackages.has(libName)) {
                showToast(`${libName} is already installed`);
                return;
            }
            
            await installLibrary(libName);
            input.value = '';
        }

        async function installLibrary(libName) {
            if (!pyodide) { showToast('Python loading...'); return; }
            const status = document.getElementById('kernelStatus');
            status.innerHTML = `Installing ${libName}...`;
            showToast(`Installing ${libName}...`);
            
            try {
                await pyodide.loadPackage(libName);
                installedPackages.add(libName);
                updateDynamicKeywords();
                localStorage.setItem('installed_packages', JSON.stringify([...installedPackages]));
                status.innerHTML = `✓ ${libName}`;
                showToast(`${libName} installed! New keywords added to autocomplete.`);
                setTimeout(() => status.innerHTML = '● Ready', 1500);
                showLibraryModal(); // Refresh modal
            } catch(err) {
                status.innerHTML = '● Error';
                showToast(`Failed: ${libName} - ${err.message}`);
                setTimeout(() => status.innerHTML = '● Ready', 1500);
            }
        }

        function showLibraryModal() {
            const modal = document.getElementById('libraryModal');
            const libList = document.getElementById('libList');
            const categories = {};
            popularLibraries.forEach(lib => { if (!categories[lib.cat]) categories[lib.cat] = []; categories[lib.cat].push(lib); });
            libList.innerHTML = '';
            for (const [cat, libs] of Object.entries(categories)) {
                const catDiv = document.createElement('div'); catDiv.className = 'lib-category'; catDiv.textContent = cat.toUpperCase(); libList.appendChild(catDiv);
                libs.forEach(lib => {
                    const isInstalled = installedPackages.has(lib.name);
                    const item = document.createElement('div'); item.className = 'lib-item';
                    item.innerHTML = `<div><div class="lib-name">${lib.name}</div><div class="lib-desc">${lib.desc}</div></div>
                        <button class="install-btn ${isInstalled ? 'installed' : ''}" onclick="installLibrary('${lib.name}')" ${isInstalled ? 'disabled' : ''}>${isInstalled ? '✓' : 'Install'}</button>`;
                    libList.appendChild(item);
                });
            }
            modal.classList.add('active');
        }

        function closeLibraryModal() { document.getElementById('libraryModal').classList.remove('active'); }

        async function extractVariables() {
            if (!pyodide) return;
            try {
                const varsJson = pyodide.runPython(`
                    import json, builtins
                    vars_dict = {}
                    for name, value in globals().items():
                        if not name.startswith('_') and name not in dir(builtins) and name not in ['pyodide', 'matplotlib', 'np', 'plt', 'pd']:
                            try: vars_dict[name] = str(value)[:60]
                            except: vars_dict[name] = '<unable>'
                    json.dumps(vars_dict)
                `);
                globalVariables = JSON.parse(varsJson);
                const container = document.getElementById('variablesList');
                const vars = Object.keys(globalVariables);
                if (vars.length === 0) { container.innerHTML = '<div style="color:#666;text-align:center;padding:15px;font-size:9px">No variables</div>'; return; }
                container.innerHTML = '';
                vars.slice(0, 12).forEach(name => {
                    const item = document.createElement('div'); item.className = 'var-item';
                    item.innerHTML = `<div class="var-name">${escapeHtml(name)}</div><div class="var-value">${escapeHtml(globalVariables[name])}</div>`;
                    container.appendChild(item);
                });
            } catch(e) {}
        }

        function escapeHtml(text) { return String(text).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        function initMonacoEditor(container, code, cellId) {
            return new Promise((resolve) => {
                require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
                require(['vs/editor/editor.main'], function() {
                    const editor = monaco.editor.create(container, {
                        value: code, language: 'python', theme: 'vs-dark',
                        fontSize: 11, fontFamily: 'Consolas, monospace', lineNumbers: 'on',
                        minimap: { enabled: false }, wordWrap: 'on', automaticLayout: true,
                        suggestOnTriggerCharacters: true, quickSuggestions: true
                    });

                    // Dynamic autocomplete provider - UPDATED WITH INSTALLED LIBRARY KEYWORDS
                    monaco.languages.registerCompletionItemProvider('python', {
                        triggerCharacters: ['.', ' '],
                        provideCompletionItems: function(model, position) {
                            const word = model.getWordUntilPosition(position);
                            const range = {
                                startLineNumber: position.lineNumber,
                                endLineNumber: position.lineNumber,
                                startColumn: word.startColumn,
                                endColumn: word.endColumn
                            };
                            const suggestions = [];
                            
                            // User variables
                            Object.keys(globalVariables).forEach(v => {
                                suggestions.push({ label: v, kind: 6, insertText: v, range: range, detail: 'your variable', sortText: '1' + v });
                            });
                            
                            // Python keywords
                            const keywords = ['def', 'class', 'import', 'from', 'as', 'return', 'if', 'elif', 'else', 'for', 'while', 'break', 'continue', 'pass', 'print', 'len', 'range', 'type', 'str', 'int', 'float', 'list', 'dict', 'set', 'tuple', 'True', 'False', 'None'];
                            keywords.forEach(k => {
                                suggestions.push({ label: k, kind: 14, insertText: k, range: range, detail: 'keyword', sortText: '2' + k });
                            });
                            
                            // Built-in functions
                            const builtins = ['abs', 'all', 'any', 'bin', 'bool', 'chr', 'dict', 'dir', 'enumerate', 'filter', 'float', 'format', 'hex', 'int', 'isinstance', 'len', 'list', 'map', 'max', 'min', 'oct', 'ord', 'pow', 'print', 'range', 'repr', 'reversed', 'round', 'set', 'sorted', 'str', 'sum', 'tuple', 'type', 'zip'];
                            builtins.forEach(b => {
                                suggestions.push({ label: b, kind: 3, insertText: b + '()', range: range, detail: 'built-in', sortText: '3' + b });
                            });
                            
                            // DYNAMIC KEYWORDS FROM INSTALLED LIBRARIES
                            dynamicKeywords.forEach(kw => {
                                suggestions.push({ label: kw, kind: 5, insertText: kw, range: range, detail: 'from installed library', sortText: '4' + kw });
                            });
                            
                            // Standard library modules suggestion
                            const stdLibs = ['os', 'sys', 'math', 'random', 'json', 'datetime', 'time', 're', 'collections', 'itertools', 'functools', 'pathlib'];
                            stdLibs.forEach(l => {
                                suggestions.push({ label: l, kind: 9, insertText: l, range: range, detail: 'standard library', sortText: '5' + l });
                            });
                            
                            // Module aliases for installed packages
                            if (installedPackages.has('numpy')) suggestions.push({ label: 'np', kind: 9, insertText: 'np', range: range, detail: 'NumPy alias', sortText: '0np' });
                            if (installedPackages.has('pandas')) suggestions.push({ label: 'pd', kind: 9, insertText: 'pd', range: range, detail: 'Pandas alias', sortText: '0pd' });
                            if (installedPackages.has('matplotlib')) suggestions.push({ label: 'plt', kind: 9, insertText: 'plt', range: range, detail: 'Matplotlib alias', sortText: '0plt' });
                            if (installedPackages.has('sympy')) suggestions.push({ label: 'sp', kind: 9, insertText: 'sp', range: range, detail: 'SymPy alias', sortText: '0sp' });
                            if (installedPackages.has('seaborn')) suggestions.push({ label: 'sns', kind: 9, insertText: 'sns', range: range, detail: 'Seaborn alias', sortText: '0sns' });
                            if (installedPackages.has('plotly')) suggestions.push({ label: 'px', kind: 9, insertText: 'px', range: range, detail: 'Plotly express', sortText: '0px' });
                            if (installedPackages.has('scikit-learn')) suggestions.push({ label: 'sklearn', kind: 9, insertText: 'sklearn', range: range, detail: 'Scikit-learn', sortText: '0sklearn' });
                            
                            return { suggestions: suggestions.slice(0, 35) };
                        }
                    });

                    editor.onDidChangeModelContent(() => {
                        const cell = cells.find(c => c.id === cellId);
                        if (cell) cell.code = editor.getValue();
                    });
                    window.editor = editor;
                    resolve(editor);
                });
            });
        }

        class Cell {
            constructor(id, code) { this.id = id; this.code = code; this.output = null; this.isPlot = false; this.editor = null; }
            
            async render(index) {
                const cellDiv = document.createElement('div'); cellDiv.className = 'cell'; cellDiv.id = `cell-${this.id}`;
                const header = document.createElement('div'); header.className = 'cell-header';
                header.innerHTML = `<span class="cell-label">In [${index + 1}]:</span>
                    <div class="cell-controls">
                        <button onclick="runCell(${this.id})">Run</button>
                        <button onclick="copyCellCode(${this.id})"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                        <button onclick="deleteCell(${this.id})">Del</button>
                        <button onclick="addCellBelow(${this.id})">Add</button>
                    </div>`;
                const editorContainer = document.createElement('div'); editorContainer.className = 'monaco-container';
                const outputDiv = document.createElement('div'); outputDiv.className = 'output';
                if (this.output) {
                    if (this.isPlot) {
                        outputDiv.innerHTML = `<img src="${this.output}" alt="plot" onclick="showImageModal('${this.output}')" style="cursor:pointer;">`;
                        outputDiv.classList.add('plot');
                    } else {
                        outputDiv.innerHTML = `<div class="output-header"><button class="copy-shell-btn" onclick="copyToClipboard(${JSON.stringify(this.output)})">Copy</button></div><div>${this.output.replace(/\n/g, '<br>')}</div>`;
                    }
                } else { outputDiv.innerHTML = '<span style="color:#666;">Ready</span>'; }
                cellDiv.appendChild(header); cellDiv.appendChild(editorContainer); cellDiv.appendChild(outputDiv);
                return { cellDiv, editorContainer };
            }
            
            async initEditor(container) { this.editor = await initMonacoEditor(container, this.code, this.id); }
            
            async execute() {
                if (!ready || !pyodide) return;
                const outputDiv = document.querySelector(`#cell-${this.id} .output`);
                if (!outputDiv) return;
                outputDiv.innerHTML = '<span style="color:#666;">Running...</span>';
                try {
                    pyodide.runPython(`import sys, io, base64; sys.stdout = io.StringIO(); captured_plots = [];`);
                    await pyodide.runPythonAsync(this.code);
                    const stdout = pyodide.runPython('sys.stdout.getvalue()');
                    const plots = pyodide.runPython('captured_plots');
                    if (plots && plots.length) {
                        this.output = `data:image/png;base64,${plots[plots.length - 1]}`; this.isPlot = true;
                        outputDiv.innerHTML = `<img src="${this.output}" alt="plot" onclick="showImageModal('${this.output}')" style="cursor:pointer;">`;
                        outputDiv.classList.add('plot');
                    } else {
                        let text = stdout.trim() || 'Done'; this.output = text; this.isPlot = false;
                        outputDiv.innerHTML = `<div class="output-header"><button class="copy-shell-btn" onclick="copyToClipboard(${JSON.stringify(text)})">Copy</button></div><div>${text.replace(/\n/g, '<br>')}</div>`;
                    }
                    await extractVariables();
                    updateDynamicKeywords();
                } catch(err) {
                    outputDiv.innerHTML = `<div>Error: ${err.message}</div>`;
                    outputDiv.classList.add('error');
                }
            }
        }

        async function renderAll() {
            const container = document.getElementById('notebook'); container.innerHTML = '';
            for (let i = 0; i < cells.length; i++) {
                const cell = cells[i];
                const { cellDiv, editorContainer } = await cell.render(i);
                container.appendChild(cellDiv);
                await cell.initEditor(editorContainer);
            }
            const addBtn = document.createElement('button'); addBtn.className = 'add-cell'; addBtn.textContent = '+ Add Cell';
            addBtn.onclick = () => { cells.push(new Cell(nextId++, '')); renderAll(); };
            container.appendChild(addBtn);
        }

        function addCellBelow(id) { const idx = cells.findIndex(c => c.id === id); cells.splice(idx + 1, 0, new Cell(nextId++, '')); renderAll(); }
        function deleteCell(id) { if (cells.length > 1) { cells = cells.filter(c => c.id !== id); renderAll(); } }
        async function runCell(id) { const cell = cells.find(c => c.id === id); if (cell) await cell.execute(); }
        async function runAllCells() { for (const cell of cells) await cell.execute(); }
        function clearAllOutputs() { cells.forEach(cell => { cell.output = null; cell.isPlot = false; }); renderAll(); }
        function refreshVariables() { extractVariables(); }
        
        window.copyCellCode = copyCellCode;
        window.copyToClipboard = copyToClipboard;
        window.installCustomLibrary = installCustomLibrary;

        async function initPython() {
            try {
                const saved = localStorage.getItem('installed_packages');
                if (saved) {
                    installedPackages = new Set(JSON.parse(saved));
                    updateDynamicKeywords();
                }
                
                updateLoading('Loading Runtime', 10, 'Downloading...');
                await new Promise(r => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js'; s.onload = r; document.head.appendChild(s); });
                
                updateLoading('Initializing', 30, 'Starting Python...');
                pyodide = await window.loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
                
                updateLoading('NumPy', 50, 'Installing numpy...');
                await pyodide.loadPackage('numpy');
                if (!installedPackages.has('numpy')) installedPackages.add('numpy');
                
                updateLoading('Matplotlib', 70, 'Installing matplotlib...');
                await pyodide.loadPackage('matplotlib');
                if (!installedPackages.has('matplotlib')) installedPackages.add('matplotlib');
                
                updateLoading('Finalizing', 90, 'Ready!');
                pyodide.runPython(`
                    import matplotlib
                    matplotlib.use('Agg')
                    import matplotlib.pyplot as plt
                    import numpy as np
                    import io, base64
                    captured_plots = []
                    def custom_show(*a,**k):
                        buf = io.BytesIO()
                        plt.savefig(buf, format='png')
                        captured_plots.append(base64.b64encode(buf.getvalue()).decode())
                        plt.close()
                    plt.show = custom_show
                `);
                
                updateDynamicKeywords();
                localStorage.setItem('installed_packages', JSON.stringify([...installedPackages]));
                ready = true;
                setTimeout(hideLoading, 500);
                await extractVariables();
                
            } catch(err) {
                document.getElementById('loadingText').textContent = 'Error loading';
                document.getElementById('loadingStatus').textContent = err.message;
                console.error(err);
            }
        }

        const starterCode = `# Python IDE - Install Any Library by Typing
# 
# Click "Install" → Type library name (e.g., requests, pandas, folium)
# Keywords appear in autocomplete automatically!

import numpy as np
import matplotlib.pyplot as plt

print("Hello from Python!")

# Try typing: np. , plt. 
# After installing libraries, new keywords appear!

# Create a simple plot
plt.plot([1,2,3,4,5], [1,4,2,3,5], 'b-o')
plt.title("Sample Plot")
plt.grid(True)
plt.show()

print("\\n📦 Click 'Install' to add any Python library!")
print("💡 Type the library name (e.g., 'pandas', 'requests')`));

        cells = [new Cell(nextId++, starterCode)];
        renderAll();
        initPython();
    </script>
</body>
