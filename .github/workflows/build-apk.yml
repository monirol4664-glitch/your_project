name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build React app
      run: npm run build
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Android project
      run: |
        mkdir -p android/app/src/main/assets
        mkdir -p android/app/src/main/java/com/mathapp
        cp -r build/* android/app/src/main/assets/
    
    - name: Create AndroidManifest.xml
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" 
                  package="com.mathapp.pro">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:icon="@android:drawable/sym_def_app_icon"
                android:label="MathMaster"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:configChanges="orientation|screenSize"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
    
    - name: Create MainActivity.java
      run: |
        cat > android/app/src/main/java/com/mathapp/MainActivity.java << 'EOF'
        package com.mathapp.pro;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.setWebViewClient(new WebViewClient());
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF
    
    - name: Create build.gradle (root)
      run: |
        cat > android/build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.4.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
    
    - name: Create app/build.gradle
      run: |
        cat > android/app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        
        android {
            compileSdk 33
            
            defaultConfig {
                applicationId "com.mathapp.pro"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt')
                }
                debug {
                    debuggable true
                }
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
    
    - name: Create settings.gradle
      run: |
        cat > android/settings.gradle << 'EOF'
        include ':app'
        rootProject.name = "MathMaster"
        EOF
    
    - name: Create gradle wrapper
      run: |
        cd android
        mkdir -p wrapper
        cat > wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        cat > gradlew << 'EOF'
        #!/bin/sh
        GRADLE_VERSION=7.5
        GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
        GRADLE_ZIP="gradle-${GRADLE_VERSION}-bin.zip"
        GRADLE_DIR="gradle-${GRADLE_VERSION}"
        
        if [ ! -d "$GRADLE_DIR" ]; then
            curl -L -o "$GRADLE_ZIP" "$GRADLE_URL"
            unzip -q "$GRADLE_ZIP"
            rm "$GRADLE_ZIP"
        fi
        
        exec "$GRADLE_DIR/bin/gradle" "$@"
        EOF
        chmod +x gradlew
        cd ..
    
    - name: Build Debug APK (Signed)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon
        cd ..
    
    - name: Create Debug Keystore and Sign
      run: |
        cd android
        # Create debug keystore
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug, O=Android, C=US"
        
        # Sign the APK
        jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore debug.keystore -storepass android -keypass android app/build/outputs/apk/debug/app-debug.apk androiddebugkey
        
        # Verify signature
        jarsigner -verify app/build/outputs/apk/debug/app-debug.apk
        
        # Align the APK
        $ANDROID_HOME/build-tools/33.0.0/zipalign -v -p 4 app/build/outputs/apk/debug/app-debug.apk MathMaster-signed.apk
        
        cd ..
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: MathMaster-Signed
        path: android/MathMaster-signed.apk
        retention-days: 90