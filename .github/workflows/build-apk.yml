name: Build Jupyter-Style IDE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool
        pip install --upgrade pip
        pip install --upgrade cython buildozer
    
    - name: Manually download and setup Android NDK
      run: |
        # Create the exact directory Buildozer expects
        mkdir -p ~/.buildozer/android/platform/
        cd ~/.buildozer/android/platform/
        
        # Download NDK with CORRECT URL
        wget https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        
        # Extract it
        unzip -q android-ndk-r27c-linux.zip
        
        # Create a symlink with the name Buildozer expects
        ln -s android-ndk-r27c android-ndk-r27
        
        # Also create version-specific directory
        ln -s android-ndk-r27c android-ndk-27.0.11902837
        
        # List to verify
        ls -la
    
    - name: Build APK with NDK path override
      run: |
        # Force Buildozer to use our NDK by setting these
        export ANDROID_NDK=/home/runner/.buildozer/android/platform/android-ndk-r27c
        export ANDROID_NDK_HOME=/home/runner/.buildozer/android/platform/android-ndk-r27c
        export ANDROID_NDK_VERSION=27c
        
        # Create a .buildozer_override file to prevent download
        mkdir -p ~/.buildozer/android/platform/
        touch ~/.buildozer/android/platform/.ndk_downloaded
        
        # Run buildozer
        buildozer android debug
      continue-on-error: false
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ./bin/*.apk
        if-no-files-found: error