name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build APK from HTML
        run: |
          # Create Android project structure
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          
          # Copy your HTML editor
          cp editor.html app/src/main/assets/
          
          # Create MainActivity
          cat > app/src/main/java/com/app/MainActivity.java << 'EOF'
          package com.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.loadUrl("file:///android_asset/editor.html");
                  setContentView(webView);
              }
          }
          EOF
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.app">
              <application android:label="Python Editor">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create build.gradle files
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              defaultConfig {
                  minSdk 21
                  targetSdk 34
              }
          }
          EOF
          
          echo 'include ":app"' > settings.gradle
          
          # Build the APK
          chmod +x gradlew 2>/dev/null || true
          ./gradlew wrapper --gradle-version 8.0 2>/dev/null || true
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: python-editor
          path: app/build/outputs/apk/debug/*.apk
