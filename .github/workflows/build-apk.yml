name: Build Mathematica Console APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          android-sdk \
          build-essential \
          libssl-dev \
          libffi-dev \
          python3-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          git \
          zip \
          unzip
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython kivy kivymd sympy mpmath matplotlib numpy pillow
    
    - name: Setup Android environment
      run: |
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "PATH=$PATH:/usr/lib/android-sdk/platform-tools" >> $GITHUB_ENV
    
    - name: Create version file
      run: |
        echo '__version__ = "1.0.0"' > src/mathematica_console/__init__.py
    
    - name: Build APK with Buildozer
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mathematica-console-apk
        path: ./bin/*.apk
