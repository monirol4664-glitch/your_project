name: Build Jupyter Mobile APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool cmake make \
          gcc g++ \
          libncurses5-dev libreadline-dev \
          libsqlite3-dev libssl-dev libffi-dev \
          python3-dev
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        rm commandlinetools-linux-9477386_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        echo "y" | cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-30" "build-tools;30.0.3"
    
    - name: Install Python-for-Android
      run: |
        git clone https://github.com/kivy/python-for-android.git
        cd python-for-android
        pip install -e .
        cd ..
    
    - name: Build APK with Jupyter components
      run: |
        p4a apk \
          --private ./src \
          --package=org.jupyter.mobile \
          --name="Jupyter Mobile" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,ipython,jupyter-client,jupyter-core,pygments,pexpect,ptyprocess,markupsafe,pyzmq \
          --android-api=30 \
          --sdk-dir=$HOME/android-sdk \
          --ndk-dir=$HOME/android-ndk-r25c \
          --ndk-version=r25c \
          --download-dir=./.p4a-downloads \
          --dist-name=jupyter-mobile \
          --release \
          --keyalias=mykey \
          --keystore=mykeystore.keystore \
          --keystore-password=password \
          --key-password=password
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-mobile-apk
        path: ./jupyter-mobile*.apk
