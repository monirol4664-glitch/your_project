name: Build APK using PWA Builder API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-pwa:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build React app
      run: npm run build
    
    - name: Create ZIP for PWA Builder
      run: |
        cd build
        zip -r ../pwa-build.zip .
        cd ..
    
    - name: Upload PWA Package
      uses: actions/upload-artifact@v4
      with:
        name: pwa-website
        path: pwa-build.zip
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        publish_branch: gh-pages

  create-apk-online:
    needs: build-pwa
    runs-on: ubuntu-latest
    
    steps:
    - name: Download PWA build
      uses: actions/download-artifact@v4
      with:
        name: pwa-website
    
    - name: Extract files
      run: unzip pwa-website.zip -d pwa-site
    
    - name: Create APK using online service
      run: |
        # Using PWA2APK API (free tier)
        curl -X POST https://pwa2apk.pwa-lab.com/api/generate \
          -H "Content-Type: application/json" \
          -d '{"url":"https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"}' \
          --output app.apk || echo "API may be rate limited"
        
        # Alternative: Use PWABuilder Cloud
        echo "Visit: https://www.pwabuilder.com to convert your PWA to APK"
        echo "Your PWA is live at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
    
    - name: Upload APK (if generated)
      uses: actions/upload-artifact@v4
      with:
        name: generated-apk
        path: app.apk
      continue-on-error: true