name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Remove any pre-installed .NET first
    - name: Remove existing .NET
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf ~/.dotnet
    
    # Install .NET 7 specifically
    - name: Setup .NET 7
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '7.0.x'
    
    # Verify .NET version
    - name: Check .NET version
      run: dotnet --info
    
    # Install MAUI for .NET 7
    - name: Install MAUI Workload
      run: dotnet workload install maui-android
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build Android APK
      run: dotnet build -c Release -f net7.0-android --no-restore
    
    - name: Publish APK
      run: dotnet publish -f net7.0-android -c Release --no-build -o output
    
    - name: Find APK
      run: |
        find . -name "*.apk" -exec cp {} aperture4.apk \; 2>/dev/null || echo "Searching..."
        ls -la output/ || echo "Checking output..."
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aperture4-apk
        path: |
          **/*.apk
          output/*.apk
          *.apk
