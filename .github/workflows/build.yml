name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Generate android folder only
      run: |
        # Backup your lib folder
        cp -r lib lib_backup
        
        # Create project in temp directory
        cd /tmp
        flutter create --platforms=android temp_project
        cd -
        
        # Copy android folder from temp project
        cp -r /tmp/temp_project/android ./
        
        # Restore your lib folder (overwriting default)
        rm -rf lib
        cp -r lib_backup lib
        
        # Create minimal necessary files
        echo 'include ":app"' > android/settings.gradle
        echo 'rootProject.buildDir = "../build"' > android/build.gradle
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide
        path: build/app/outputs/flutter-apk/app-release.apk