name: Build APK using Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK with Docker (Non-root user)
      run: |
        docker run --rm \
          -v $(pwd):/home/user/hostdir \
          -w /home/user/hostdir \
          --user 1000:1000 \
          kivy/buildozer:latest \
          buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ./bin/*.apk
        if-no-files-found: error