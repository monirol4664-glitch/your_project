name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    # Using Ubuntu 22.04 instead of latest (24.04) because libtinfo5 is available
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Buildozer dependencies
      run: |
        sudo apt update
        sudo apt install -y libtinfo5
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython
    
    - name: Build APK
      run: |
        # Create .buildozer to avoid download prompts
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/25.2.9519653
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ./bin/*.apk