name: Build Android Debug APK
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create frontend files
        run: |
          mkdir -p frontend/src
          
          # Create package.json
          cat > frontend/package.json << 'EOF'
          {
            "name": "python-notebook",
            "version": "1.0.0",
            "type": "module",
            "scripts": {
              "build": "vite build"
            },
            "dependencies": {
              "react": "^18.2.0",
              "react-dom": "^18.2.0",
              "@monaco-editor/react": "^4.6.0"
            },
            "devDependencies": {
              "@vitejs/plugin-react": "^4.2.0",
              "vite": "^5.0.0",
              "typescript": "^5.0.0"
            }
          }
          EOF
          
          # Create vite.config.js
          cat > frontend/vite.config.js << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          
          export default defineConfig({
            plugins: [react()],
            server: {
              port: 3000
            }
          })
          EOF
          
          # Create index.html
          cat > frontend/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
              <title>Python Notebook</title>
              <style>
                body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
                #root { height: 100vh; width: 100vw; }
              </style>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.jsx"></script>
            </body>
          </html>
          EOF
          
          # Create main.jsx
          cat > frontend/src/main.jsx << 'EOF'
          import React from 'react'
          import ReactDOM from 'react-dom/client'
          import PythonEditor from './PythonEditor'
          
          ReactDOM.createRoot(document.getElementById('root')).render(
            <React.StrictMode>
              <PythonEditor />
            </React.StrictMode>
          )
          EOF
          
          # Create PythonEditor.jsx
          cat > frontend/src/PythonEditor.jsx << 'EOF'
          import React, { useRef } from 'react';
          import Editor from '@monaco-editor/react';
          
          const PythonEditor = () => {
            const editorRef = useRef(null);
          
            const handleEditorDidMount = (editor, monaco) => {
              editorRef.current = editor;
              
              // Register Python autocomplete provider
              monaco.languages.registerCompletionItemProvider('python', {
                provideCompletionItems: () => {
                  const keywords = [
                    'def', 'class', 'import', 'from', 'as', 'return', 
                    'if', 'elif', 'else', 'for', 'while', 'break', 
                    'continue', 'pass', 'try', 'except', 'finally',
                    'with', 'lambda', 'yield', 'assert', 'print',
                    'len', 'range', 'enumerate', 'zip', 'map', 'filter',
                    'sorted', 'sum', 'min', 'max', 'abs', 'round', 'type',
                    'int', 'str', 'float', 'list', 'dict', 'set', 'tuple'
                  ];
                  
                  const suggestions = keywords.map(keyword => ({
                    label: keyword,
                    kind: monaco.languages.CompletionItemKind.Keyword,
                    insertText: keyword,
                    detail: 'Python ' + (keyword === 'def' ? 'function definition' : 
                           keyword === 'class' ? 'class definition' : 'keyword')
                  }));
                  
                  return { suggestions };
                }
              });
            };
          
            return (
              <div style={{ height: '100vh', width: '100%' }}>
                <Editor
                  height="100%"
                  defaultLanguage="python"
                  defaultValue='# Welcome to Python Notebook!\n# Write your code here\n\nprint("Hello, World!")\n\n# Try typing "def " or "pri" for autocomplete'
                  theme="vs-dark"
                  onMount={handleEditorDidMount}
                  options={{
                    fontSize: 16,
                    minimap: { enabled: true },
                    wordWrap: 'on',
                    automaticLayout: true,
                    suggestOnTriggerCharacters: true,
                    quickSuggestions: true,
                    acceptSuggestionOnEnter: 'on',
                    tabCompletion: 'on',
                    lineNumbers: 'on',
                    cursorBlinking: 'smooth'
                  }}
                />
              </div>
            );
          };
          
          export default PythonEditor;
          EOF

      - name: Install frontend dependencies and build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Capacitor and TypeScript
        run: |
          npm install -g @capacitor/cli @capacitor/core
          npm install -D typescript @capacitor/cli @capacitor/core @capacitor/android

      - name: Create capacitor.config.json (not TypeScript)
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.python.notebook",
            "appName": "Python Notebook",
            "webDir": "frontend/dist",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            }
          }
          EOF

      - name: Create package.json for root
        run: |
          cat > package.json << 'EOF'
          {
            "name": "python-notebook-apk",
            "version": "1.0.0",
            "devDependencies": {
              "@capacitor/cli": "^6.0.0",
              "@capacitor/android": "^6.0.0",
              "typescript": "^5.0.0"
            }
          }
          EOF

      - name: Initialize Capacitor
        run: npx cap init com.python.notebook "Python Notebook" --web-dir=frontend/dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: python-notebook-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
