name: Fast Jupyter Mobile APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
      
      - name: Create Android App
        run: |
          # Create directory structure
          mkdir -p app/src/main/assets/jupyter
          mkdir -p app/src/main/java/com/jupyter/mobile
          mkdir -p app/src/main/res/layout
          
          # Create MainActivity.java
          cat > app/src/main/java/com/jupyter/mobile/MainActivity.java << 'EOF'
          package com.jupyter.mobile;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  webView = findViewById(R.id.webview);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/jupyter/index.html");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF
          
          # Create layout file
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          EOF
          
          # Create manifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="Jupyter Mobile">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
      
      - name: Create Jupyter HTML
        run: |
          cat > app/src/main/assets/jupyter/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Jupyter Mobile</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; }
                  #toolbar { background: #2d2d2d; padding: 10px; display: flex; gap: 10px; }
                  button { background: #0e639c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
                  button.danger { background: #a1260d; }
                  #cells { padding: 20px; }
                  .cell { background: #252526; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
                  .cell-header { background: #2d2d2d; padding: 8px 12px; display: flex; justify-content: space-between; }
                  .cell-content { padding: 12px; }
                  .code-input { width: 100%; background: #1e1e1e; color: #d4d4d4; border: 1px solid #3e3e3e; font-family: monospace; padding: 10px; border-radius: 4px; }
                  .output { background: #1e1e1e; margin-top: 10px; padding: 10px; border-radius: 4px; border-left: 3px solid #0e639c; white-space: pre-wrap; }
                  .status { background: #007acc; color: white; padding: 4px 12px; font-size: 12px; position: fixed; bottom: 0; width: 100%; }
              </style>
          </head>
          <body>
              <div id="toolbar">
                  <button onclick="addCell()">New Cell</button>
                  <button onclick="runAll()">Run All</button>
                  <button onclick="resetNotebook()">Reset</button>
              </div>
              <div id="cells"></div>
              <div class="status" id="status">Loading Python...</div>
              
              <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
              <script>
                  let pyodide = null;
                  let cells = [];
                  let nextId = 0;
                  
                  async function init() {
                      document.getElementById('status').innerText = 'Loading Python...';
                      pyodide = await loadPyodide();
                      document.getElementById('status').innerText = 'Python Ready!';
                      addCell();
                  }
                  
                  function addCell() {
                      const id = nextId++;
                      cells.push({id: id, code: 'print("Hello from Jupyter!")'});
                      render();
                  }
                  
                  function render() {
                      const container = document.getElementById('cells');
                      container.innerHTML = '';
                      cells.forEach((cell, idx) => {
                          const div = document.createElement('div');
                          div.className = 'cell';
                          div.innerHTML = 
                              '<div class="cell-header">' +
                              '<span>Cell ' + (idx+1) + '</span>' +
                              '<div>' +
                              '<button onclick="runCell(' + cell.id + ')">Run</button> ' +
                              '<button onclick="deleteCell(' + cell.id + ')">Delete</button>' +
                              '</div></div>' +
                              '<div class="cell-content">' +
                              '<textarea class="code-input" id="code-' + cell.id + '" rows="4">' + escapeHtml(cell.code) + '</textarea>' +
                              '<div class="output" id="output-' + cell.id + '">// Click Run</div>' +
                              '</div>';
                          container.appendChild(div);
                      });
                  }
                  
                  async function runCell(id) {
                      const cell = cells.find(c => c.id === id);
                      const ta = document.getElementById('code-' + id);
                      cell.code = ta.value;
                      const outDiv = document.getElementById('output-' + id);
                      outDiv.innerText = 'Running...';
                      
                      try {
                          pyodide.runPython('import sys\nfrom io import StringIO\nsys.stdout = StringIO()');
                          await pyodide.runPythonAsync(cell.code);
                          const result = pyodide.runPython('sys.stdout.getvalue()');
                          outDiv.innerText = result || 'Done';
                      } catch(e) {
                          outDiv.innerText = 'Error: ' + e;
                      }
                  }
                  
                  async function runAll() {
                      for(const cell of cells) {
                          await runCell(cell.id);
                      }
                  }
                  
                  function deleteCell(id) {
                      cells = cells.filter(c => c.id !== id);
                      render();
                  }
                  
                  function resetNotebook() {
                      if(confirm('Reset all?')) {
                          cells = [];
                          nextId = 0;
                          addCell();
                      }
                  }
                  
                  function escapeHtml(str) {
                      return str.replace(/[&<>]/g, function(m) {
                          if(m === '&') return '&amp;';
                          if(m === '<') return '&lt;';
                          if(m === '>') return '&gt;';
                          return m;
                      });
                  }
                  
                  init();
              </script>
          </body>
          </html>
          EOF
      
      - name: Setup Gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.jupyter.mobile'
              defaultConfig {
                  applicationId "com.jupyter.mobile"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          echo "include ':app'" > settings.gradle
          
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          
          echo '#!/bin/bash' > gradlew
          echo 'exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew
      
      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          ./gradlew assembleRelease --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Mobile
          path: app/build/outputs/apk/release/*.apk