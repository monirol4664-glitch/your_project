<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Python Notebook Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #editor-container {
            height: 100%;
            width: 100%;
        }
        
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #007acc;
            color: white;
            padding: 4px 12px;
            font-size: 12px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="editor-container"></div>
    <div class="status-bar">
        <span>🐍 Python Notebook</span>
        <span>Autocomplete • Syntax Highlighting</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        // Configure Monaco
        require.config({ 
            paths: { 
                vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' 
            } 
        });
        
        require(['vs/editor/editor.main'], function() {
            // Create editor
            const editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: `# 🐍 Python Notebook Editor
# ===========================
# Welcome to your mobile Python editor!
# Features:
#   ✓ Syntax highlighting
#   ✓ Autocomplete suggestions  
#   ✓ Smart indentation
#   ✓ Line numbers
#   ✓ Dark theme

# Try typing: def, class, import, for, if
# Suggestions will appear automatically!

def greet(name):
    """A simple greeting function"""
    return f"Hello, {name}!"

class Calculator:
    def add(self, a, b):
        return a + b
    
    def multiply(self, a, b):
        return a * b

# Example usage
message = greet("Python Developer")
print(message)

calc = Calculator()
result = calc.add(10, 20)
print(f"10 + 20 = {result}")

# Practice area below:
print("Ready to code! 🚀")
`,
                language: 'python',
                theme: 'vs-dark',
                fontSize: 14,
                fontFamily: 'monospace',
                minimap: { enabled: true, scale: 2 },
                automaticLayout: true,
                lineNumbers: 'on',
                roundedSelection: true,
                scrollBeyondLastLine: true,
                readOnly: false,
                fontSize: 16,
                fontWeight: 'normal',
                wordWrap: 'on',
                wrappingStrategy: 'advanced',
                suggestOnTriggerCharacters: true,
                quickSuggestions: {
                    other: true,
                    comments: false,
                    strings: false
                },
                acceptSuggestionOnEnter: 'on',
                tabCompletion: 'on',
                snippetSuggestions: 'top',
                parameterHints: { enabled: true },
                formatOnPaste: true,
                formatOnType: true,
                renderWhitespace: 'selection',
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: 'on',
                smoothScrolling: true
            });
            
            // Python keywords for autocomplete
            const pythonKeywords = [
                'False', 'None', 'True', 'and', 'as', 'assert', 'async', 'await',
                'break', 'class', 'continue', 'def', 'del', 'elif', 'else', 'except',
                'finally', 'for', 'from', 'global', 'if', 'import', 'in', 'is',
                'lambda', 'nonlocal', 'not', 'or', 'pass', 'raise', 'return',
                'try', 'while', 'with', 'yield'
            ];
            
            const pythonBuiltins = [
                'abs', 'all', 'any', 'ascii', 'bin', 'bool', 'bytearray', 'bytes',
                'callable', 'chr', 'classmethod', 'compile', 'complex', 'delattr',
                'dict', 'dir', 'divmod', 'enumerate', 'eval', 'exec', 'filter',
                'float', 'format', 'frozenset', 'getattr', 'globals', 'hasattr',
                'hash', 'help', 'hex', 'id', 'input', 'int', 'isinstance', 'issubclass',
                'iter', 'len', 'list', 'locals', 'map', 'max', 'memoryview', 'min',
                'next', 'object', 'oct', 'open', 'ord', 'pow', 'print', 'property',
                'range', 'repr', 'reversed', 'round', 'set', 'setattr', 'slice',
                'sorted', 'staticmethod', 'str', 'sum', 'super', 'tuple', 'type',
                'vars', 'zip'
            ];
            
            // Register Python autocomplete provider
            monaco.languages.registerCompletionItemProvider('python', {
                provideCompletionItems: function(model, position) {
                    const suggestions = [];
                    
                    // Add keywords
                    pythonKeywords.forEach(keyword => {
                        suggestions.push({
                            label: keyword,
                            kind: monaco.languages.CompletionItemKind.Keyword,
                            insertText: keyword,
                            detail: 'Python keyword',
                            sortText: '1' + keyword
                        });
                    });
                    
                    // Add builtins
                    pythonBuiltins.forEach(builtin => {
                        suggestions.push({
                            label: builtin,
                            kind: monaco.languages.CompletionItemKind.Function,
                            insertText: builtin,
                            detail: 'Built-in function',
                            sortText: '2' + builtin
                        });
                    });
                    
                    // Add common snippets
                    suggestions.push({
                        label: 'def',
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: 'def ${1:function_name}(${2:params}):\n    ${3:pass}',
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                        detail: 'Function definition',
                        sortText: '0def'
                    });
                    
                    suggestions.push({
                        label: 'class',
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: 'class ${1:ClassName}:\n    def __init__(self${2:, params}):\n        ${3:pass}\n    \n    def ${4:method_name}(self):\n        ${5:pass}',
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                        detail: 'Class definition',
                        sortText: '0class'
                    });
                    
                    suggestions.push({
                        label: 'if',
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: 'if ${1:condition}:\n    ${2:pass}',
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                        detail: 'If statement',
                        sortText: '0if'
                    });
                    
                    suggestions.push({
                        label: 'for',
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: 'for ${1:item} in ${2:iterable}:\n    ${3:pass}',
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                        detail: 'For loop',
                        sortText: '0for'
                    });
                    
                    suggestions.push({
                        label: 'print',
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: 'print(${1:value})',
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                        detail: 'Print to console',
                        sortText: '2print'
                    });
                    
                    return { suggestions: suggestions };
                }
            });
            
            // Add hover provider for documentation
            monaco.languages.registerHoverProvider('python', {
                provideHover: function(model, position) {
                    const word = model.getWordAtPosition(position);
                    if (word) {
                        const keyword = word.word;
                        if (pythonKeywords.includes(keyword)) {
                            return {
                                contents: [{ value: `**${keyword}**\n\nPython keyword. [Learn more](https://docs.python.org/3/reference/lexical_analysis.html#keywords)` }]
                            };
                        }
                        if (pythonBuiltins.includes(keyword)) {
                            return {
                                contents: [{ value: `**${keyword}()**\n\nPython built-in function.\n\n[Python documentation](https://docs.python.org/3/library/functions.html#${keyword})` }]
                            };
                        }
                    }
                    return null;
                }
            });
            
            // Console.log to confirm everything is working
            console.log('Python Editor loaded with autocomplete!');
        });
    </script>
</body>
</html>
