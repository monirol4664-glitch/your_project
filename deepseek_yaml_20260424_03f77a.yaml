name: Fast Jupyter Mobile APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create Android Project
        run: |
          # Create project structure
          mkdir -p app/src/main/assets/jupyter
          mkdir -p app/src/main/java/com/jupyter/mobile
          mkdir -p app/src/main/res/layout
          
          # Main Activity
          cat > app/src/main/java/com/jupyter/mobile/MainActivity.java << 'JAVA'
          package com.jupyter.mobile;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  webView = findViewById(R.id.webview);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/jupyter/index.html");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA
          
          # Layout
          cat > app/src/main/res/layout/activity_main.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          XML
          
          # Manifest
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="Jupyter Mobile">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
      
      - name: Create JupyterLite Interface
        run: |
          cd app/src/main/assets/jupyter
          
          # Create HTML interface
          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Jupyter Mobile</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; }
                  #container { display: flex; flex-direction: column; height: 100vh; }
                  #toolbar {
                      background: #2d2d2d;
                      padding: 10px;
                      border-bottom: 1px solid #3e3e3e;
                      display: flex;
                      gap: 10px;
                      flex-wrap: wrap;
                  }
                  button {
                      background: #0e639c;
                      color: white;
                      border: none;
                      padding: 8px 16px;
                      border-radius: 4px;
                      cursor: pointer;
                      font-size: 14px;
                  }
                  button:hover { background: #1177bb; }
                  button.danger { background: #a1260d; }
                  button.danger:hover { background: #c42b1a; }
                  #cells { flex: 1; overflow-y: auto; padding: 20px; }
                  .cell {
                      background: #252526;
                      margin-bottom: 20px;
                      border-radius: 8px;
                      overflow: hidden;
                  }
                  .cell-header {
                      background: #2d2d2d;
                      padding: 8px 12px;
                      font-size: 12px;
                      border-bottom: 1px solid #3e3e3e;
                      display: flex;
                      justify-content: space-between;
                  }
                  .cell-content { padding: 12px; }
                  .code-input {
                      width: 100%;
                      background: #1e1e1e;
                      color: #d4d4d4;
                      border: 1px solid #3e3e3e;
                      font-family: monospace;
                      font-size: 14px;
                      padding: 10px;
                      border-radius: 4px;
                      resize: vertical;
                  }
                  .output {
                      background: #1e1e1e;
                      margin-top: 10px;
                      padding: 10px;
                      border-radius: 4px;
                      font-family: monospace;
                      font-size: 13px;
                      white-space: pre-wrap;
                      border-left: 3px solid #0e639c;
                  }
                  .status {
                      background: #007acc;
                      color: white;
                      padding: 4px 12px;
                      font-size: 12px;
                  }
              </style>
          </head>
          <body>
              <div id="container">
                  <div id="toolbar">
                      <button onclick="addCell()">+ New Cell</button>
                      <button onclick="runAll()">▶ Run All</button>
                      <button onclick="clearOutputs()">Clear Outputs</button>
                      <button class="danger" onclick="resetNotebook()">Reset</button>
                  </div>
                  <div id="cells"></div>
                  <div class="status" id="status">Ready ✓</div>
              </div>
              
              <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
              <script>
                  let pyodide = null;
                  let cells = [];
                  let cellCount = 0;
                  
                  async function initPyodide() {
                      updateStatus("Loading Python...");
                      pyodide = await loadPyodide();
                      await pyodide.loadPackage(["numpy", "matplotlib"]);
                      updateStatus("Python Ready ✓");
                  }
                  
                  function updateStatus(msg) {
                      document.getElementById('status').textContent = msg;
                  }
                  
                  async function addCell(code = '') {
                      const cellId = cellCount++;
                      const cell = {
                          id: cellId,
                          code: code || '# Write Python code here\nprint("Hello from Jupyter Mobile!")'
                      };
                      cells.push(cell);
                      renderCell(cell);
                  }
                  
                  async function renderCell(cell) {
                      const cellsDiv = document.getElementById('cells');
                      const cellDiv = document.createElement('div');
                      cellDiv.className = 'cell';
                      cellDiv.id = `cell-${cell.id}`;
                      
                      cellDiv.innerHTML = `
                          <div class="cell-header">
                              <span>Cell ${cells.findIndex(c => c.id === cell.id) + 1}</span>
                              <div>
                                  <button onclick="runCell(${cell.id})" style="background:#0e639c;padding:4px 12px;">Run</button>
                                  <button onclick="deleteCell(${cell.id})" style="background:#a1260d;padding:4px 12px;">Delete</button>
                              </div>
                          </div>
                          <div class="cell-content">
                              <textarea class="code-input" id="code-${cell.id}" rows="5">${escapeHtml(cell.code)}</textarea>
                              <div class="output" id="output-${cell.id}">// Click Run to execute</div>
                          </div>
                      `;
                      
                      cellsDiv.appendChild(cellDiv);
                  }
                  
                  async function runCell(cellId) {
                      const cell = cells.find(c => c.id === cellId);
                      const textarea = document.getElementById(`code-${cell.id}`);
                      const code = textarea.value;
                      cell.code = code;
                      
                      const outputDiv = document.getElementById(`output-${cell.id}`);
                      outputDiv.innerHTML = "Running...";
                      
                      try {
                          pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
                          `);
                          
                          await pyodide.runPythonAsync(code);
                          
                          const stdout = pyodide.runPython("sys.stdout.getvalue()");
                          outputDiv.innerHTML = stdout || "✓ Execution completed (no output)";
                      } catch (err) {
                          outputDiv.innerHTML = `❌ Error:\n${err}`;
                      }
                      
                      updateStatus(`Cell ${cells.findIndex(c => c.id === cell.id) + 1} executed`);
                  }
                  
                  async function runAll() {
                      for (const cell of cells) {
                          await runCell(cell.id);
                      }
                  }
                  
                  function deleteCell(cellId) {
                      cells = cells.filter(c => c.id !== cellId);
                      document.getElementById(`cell-${cellId}`).remove();
                      updateStatus("Cell deleted");
                  }
                  
                  function clearOutputs() {
                      cells.forEach(cell => {
                          const output = document.getElementById(`output-${cell.id}`);
                          if (output) output.innerHTML = "Output cleared";
                      });
                  }
                  
                  function resetNotebook() {
                      if(confirm("Reset all cells?")) {
                          cells = [];
                          document.getElementById('cells').innerHTML = '';
                          addCell();
                          updateStatus("Notebook reset");
                      }
                  }
                  
                  function escapeHtml(text) {
                      return text.replace(/[&<>]/g, function(m) {
                          if(m === '&') return '&amp;';
                          if(m === '<') return '&lt;';
                          if(m === '>') return '&gt;';
                          return m;
                      });
                  }
                  
                  initPyodide().then(() => addCell());
              </script>
          </body>
          </html>
          HTML
      
      - name: Create Gradle Files
        run: |
          # build.gradle
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          GRADLE
          
          # app/build.gradle
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.jupyter.mobile'
              defaultConfig {
                  applicationId "com.jupyter.mobile"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          GRADLE
          
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # gradle wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROP'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROP
          
          # Create gradlew script
          cat > gradlew << 'GRADLEW'
          #!/bin/bash
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x gradlew
          
          # Download gradle wrapper jar
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Mobile-APK
          path: app/build/outputs/apk/release/*.apk