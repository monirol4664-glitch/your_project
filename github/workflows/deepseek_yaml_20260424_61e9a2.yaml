name: Fast Jupyter Mobile APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK (Manual - Reliable)
        run: |
          # Download Android SDK command line tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          # Set environment variables
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          # Accept licenses and install required components
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            $HOME/android-sdk
            ~/.android
          key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-
      
      - name: Create Android Project
        run: |
          # Create project structure
          mkdir -p app/src/main/assets/jupyter
          mkdir -p app/src/main/java/com/jupyter/mobile
          mkdir -p app/src/main/res/layout
          
          # Main Activity
          cat > app/src/main/java/com/jupyter/mobile/MainActivity.java << 'JAVA'
          package com.jupyter.mobile;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  webView = findViewById(R.id.webview);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setDatabaseEnabled(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/jupyter/index.html");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVA
          
          # Layout
          cat > app/src/main/res/layout/activity_main.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          XML
          
          # Manifest
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.jupyter.mobile">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application android:allowBackup="true" android:label="Jupyter Mobile" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
      
      - name: Create JupyterLite Interface
        run: |
          cd app/src/main/assets/jupyter
          
          # Create HTML interface
          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
              <title>Jupyter Mobile</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; -webkit-tap-highlight-color: transparent; }
                  #container { display: flex; flex-direction: column; height: 100vh; }
                  #toolbar {
                      background: #2d2d2d;
                      padding: 10px;
                      border-bottom: 1px solid #3e3e3e;
                      display: flex;
                      gap: 10px;
                      flex-wrap: wrap;
                      position: sticky;
                      top: 0;
                      z-index: 100;
                  }
                  button {
                      background: #0e639c;
                      color: white;
                      border: none;
                      padding: 10px 16px;
                      border-radius: 6px;
                      cursor: pointer;
                      font-size: 14px;
                      font-weight: 500;
                  }
                  button:active { opacity: 0.8; }
                  button.danger { background: #a1260d; }
                  #cells { flex: 1; overflow-y: auto; padding: 20px; }
                  .cell {
                      background: #252526;
                      margin-bottom: 20px;
                      border-radius: 8px;
                      overflow: hidden;
                      border: 1px solid #3e3e3e;
                  }
                  .cell-header {
                      background: #2d2d2d;
                      padding: 10px 15px;
                      font-size: 12px;
                      border-bottom: 1px solid #3e3e3e;
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                  }
                  .cell-header button {
                      padding: 5px 12px;
                      font-size: 12px;
                      margin-left: 8px;
                  }
                  .cell-content { padding: 15px; }
                  .code-input {
                      width: 100%;
                      background: #1e1e1e;
                      color: #d4d4d4;
                      border: 1px solid #3e3e3e;
                      font-family: 'Courier New', monospace;
                      font-size: 14px;
                      padding: 12px;
                      border-radius: 6px;
                      resize: vertical;
                  }
                  .code-input:focus { outline: none; border-color: #0e639c; }
                  .output {
                      background: #1e1e1e;
                      margin-top: 12px;
                      padding: 12px;
                      border-radius: 6px;
                      font-family: 'Courier New', monospace;
                      font-size: 13px;
                      white-space: pre-wrap;
                      border-left: 3px solid #0e639c;
                      max-height: 300px;
                      overflow: auto;
                  }
                  .status {
                      background: #007acc;
                      color: white;
                      padding: 8px 15px;
                      font-size: 12px;
                      position: sticky;
                      bottom: 0;
                  }
                  @media (max-width: 600px) {
                      button { padding: 8px 12px; font-size: 12px; }
                      .cell-header button { padding: 4px 10px; }
                      .code-input { font-size: 12px; }
                  }
              </style>
          </head>
          <body>
              <div id="container">
                  <div id="toolbar">
                      <button onclick="addCell()">+ New Cell</button>
                      <button onclick="runAll()">▶ Run All</button>
                      <button onclick="clearOutputs()">Clear Outputs</button>
                      <button class="danger" onclick="resetNotebook()">Reset</button>
                  </div>
                  <div id="cells"></div>
                  <div class="status" id="status">Initializing Python...</div>
              </div>
              
              <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
              <script>
                  let pyodide = null;
                  let cells = [];
                  let cellCounter = 0;
                  
                  async function initPyodide() {
                      updateStatus("Loading Python runtime (first time may take a moment)...");
                      try {
                          pyodide = await loadPyodide({
                              indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
                          });
                          updateStatus("Loading packages...");
                          await pyodide.loadPackage(["numpy"]);
                          updateStatus("✓ Ready - You can now run Python code!");
                      } catch(err) {
                          updateStatus("Error loading Python: " + err);
                          console.error(err);
                      }
                  }
                  
                  function updateStatus(msg) {
                      document.getElementById('status').textContent = msg;
                  }
                  
                  function addCell(code = null) {
                      const cellId = cellCounter++;
                      const defaultCode = code || '# Write Python code here\nprint("Hello from Jupyter Mobile!")\n\n# Try:\n# 2 + 2\n# import numpy as np\n# np.array([1,2,3])';
                      cells.push({
                          id: cellId,
                          code: defaultCode
                      });
                      renderAllCells();
                  }
                  
                  function renderAllCells() {
                      const cellsDiv = document.getElementById('cells');
                      cellsDiv.innerHTML = '';
                      cells.forEach((cell, idx) => {
                          const cellDiv = document.createElement('div');
                          cellDiv.className = 'cell';
                          cellDiv.id = `cell-${cell.id}`;
                          
                          cellDiv.innerHTML = `
                              <div class="cell-header">
                                  <span><strong>Cell ${idx + 1}</strong></span>
                                  <div>
                                      <button onclick="runCell(${cell.id})" style="background:#0e639c;">▶ Run</button>
                                      <button onclick="deleteCell(${cell.id})" style="background:#a1260d;">🗑 Delete</button>
                                  </div>
                              </div>
                              <div class="cell-content">
                                  <textarea class="code-input" id="code-${cell.id}" rows="4">${escapeHtml(cell.code)}</textarea>
                                  <div class="output" id="output-${cell.id}">// Click Run to execute</div>
                              </div>
                          `;
                          cellsDiv.appendChild(cellDiv);
                      });
                  }
                  
                  async function runCell(cellId) {
                      const cell = cells.find(c => c.id === cellId);
                      const textarea = document.getElementById(`code-${cell.id}`);
                      const code = textarea.value;
                      cell.code = code;
                      
                      const outputDiv = document.getElementById(`output-${cell.id}`);
                      outputDiv.innerHTML = "⏳ Running...";
                      
                      try {
                          // Redirect stdout
                          pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
                          `);
                          
                          await pyodide.runPythonAsync(code);
                          
                          const stdout = pyodide.runPython("sys.stdout.getvalue()");
                          const stderr = pyodide.runPython("sys.stderr.getvalue()");
                          
                          if (stdout) {
                              outputDiv.innerHTML = stdout;
                          } else if (stderr) {
                              outputDiv.innerHTML = "⚠️ " + stderr;
                          } else {
                              outputDiv.innerHTML = "✅ Execution completed (no output)";
                          }
                      } catch (err) {
                          outputDiv.innerHTML = "❌ Error:\n" + err;
                      }
                      
                      updateStatus(`Cell ${cells.findIndex(c => c.id === cell.id) + 1} executed`);
                  }
                  
                  async function runAll() {
                      updateStatus(`Running ${cells.length} cells...`);
                      for (const cell of cells) {
                          await runCell(cell.id);
                          await new Promise(r => setTimeout(r, 100));
                      }
                      updateStatus("✓ All cells executed");
                  }
                  
                  function deleteCell(cellId) {
                      const index = cells.findIndex(c => c.id === cellId);
                      if (index !== -1) {
                          cells.splice(index, 1);
                          renderAllCells();
                          updateStatus("Cell deleted");
                      }
                  }
                  
                  function clearOutputs() {
                      cells.forEach(cell => {
                          const output = document.getElementById(`output-${cell.id}`);
                          if (output) output.innerHTML = "// Output cleared";
                      });
                      updateStatus("Outputs cleared");
                  }
                  
                  function resetNotebook() {
                      if(confirm("Reset all cells? This cannot be undone.")) {
                          cells = [];
                          cellCounter = 0;
                          addCell();
                          updateStatus("Notebook reset");
                      }
                  }
                  
                  function escapeHtml(text) {
                      const div = document.createElement('div');
                      div.textContent = text;
                      return div.innerHTML;
                  }
                  
                  // Initialize when page loads
                  window.onload = async () => {
                      await initPyodide();
                      addCell();
                  };
              </script>
          </body>
          </html>
          HTML
      
      - name: Create Gradle Files
        run: |
          # Top-level build.gradle
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          GRADLE
          
          # app/build.gradle
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 34
              namespace 'com.jupyter.mobile'
              
              defaultConfig {
                  applicationId "com.jupyter.mobile"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          GRADLE
          
          # settings.gradle
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "JupyterMobile"
          include ':app'
          GRADLE
          
          # gradle wrapper properties
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROP'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROP
          
          # Create gradlew script
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          DEFAULT_JVM_OPTS=""
          # Use the maximum available RAM
          JAVA_OPTS="-Xmx2048m"
          CLASSPATH=gradle/wrapper/gradle-wrapper.jar
          MAIN_CLASS=org.gradle.wrapper.GradleWrapperMain
          exec java $JAVA_OPTS -cp "$CLASSPATH" $MAIN_CLASS "$@"
          GRADLEW
          chmod +x gradlew
          
          # Download gradle wrapper jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
      
      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      
      - name: Find and Upload APK
        run: |
          find app/build/outputs -name "*.apk" -exec ls -lh {} \;
          cp app/build/outputs/apk/release/*.apk jupyter-mobile.apk || true
          cp app/build/outputs/apk/debug/*.apk jupyter-mobile.apk || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Mobile-APK
          path: |
            **/*.apk
            !**/*-unaligned.apk